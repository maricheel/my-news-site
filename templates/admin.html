{% extends "base.html" %}
{% block title %}Admin — msnow.click{% endblock %}

{% block content %}
<div class="max-w-[1000px] mx-auto">

  <div class="mb-8 pb-6 border-b border-ink-800 flex items-start justify-between gap-4 flex-wrap">
    <div>
      <div class="font-mono text-[11px] uppercase tracking-[0.22em] text-ember-soft mb-2">Dashboard</div>
      <h1 class="font-serif text-3xl text-ink-100">Admin</h1>
    </div>
    <button onclick="logout()" class="mt-1 inline-flex items-center gap-2 h-9 px-4 rounded-md ring-1 ring-ink-700 hover:ring-live/50 text-ink-400 hover:text-live text-[12px] font-mono transition">
      Sign out
    </button>
  </div>

  <!-- Premium toggle -->
  <div class="mb-8 rounded-xl ring-1 ring-ink-800 bg-ink-900/40 p-5 flex flex-wrap items-center justify-between gap-4">
    <div>
      <div class="font-mono text-[11px] uppercase tracking-[0.22em] text-ink-500 mb-1">Access Mode</div>
      <div class="flex items-center gap-2.5">
        <span id="mode-label" class="font-serif text-lg text-ink-100">—</span>
        <span id="mode-badge" class="hidden px-2 py-0.5 rounded font-mono text-[10px] uppercase tracking-widest"></span>
      </div>
      <p id="mode-desc" class="mt-1 text-[12px] text-ink-500"></p>
    </div>
    <button id="toggle-btn" onclick="togglePremium()"
      class="inline-flex items-center gap-2 h-10 px-5 rounded-md font-medium text-[13px] transition ring-1 ring-ink-700 bg-ink-900 text-ink-300 hover:text-ink-100 hover:ring-ink-500 cursor-pointer">
      <span id="toggle-label">Loading…</span>
    </button>
  </div>

  <!-- Stats -->
  <div id="stats" class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-10">
    <div class="flex items-center justify-center py-10 col-span-3 gap-3 text-ink-500">
      <span class="inline-block w-4 h-4 border-2 border-ink-700 border-t-ember rounded-full spin"></span> Loading…
    </div>
  </div>

  <!-- Recent posts -->
  <div class="mb-10">
    <div class="font-mono text-[11px] uppercase tracking-[0.22em] text-ink-500 mb-4">Recent Segments</div>
    <div id="recent" class="rounded-xl ring-1 ring-ink-800 overflow-hidden bg-ink-900/40">
      <div class="flex items-center justify-center py-10 gap-3 text-ink-500">
        <span class="inline-block w-4 h-4 border-2 border-ink-700 border-t-ember rounded-full spin"></span> Loading…
      </div>
    </div>
  </div>

  <!-- WhatsApp contact setting -->
  <div class="mb-8">
    <div class="font-mono text-[11px] uppercase tracking-[0.22em] text-ink-500 mb-4">WhatsApp Number</div>
    <div class="rounded-xl ring-1 ring-ink-800 bg-ink-900/40 p-5 flex flex-wrap gap-3 items-center">
      <input type="text" id="wa-number" placeholder="International format, e.g. 212600000000"
        class="flex-1 min-w-[220px] bg-ink-900 ring-1 ring-ink-700 rounded-md px-3 py-2 text-[14px] text-ink-100 outline-none focus:ring-ember/50">
      <button onclick="saveWhatsapp()"
        class="h-10 px-5 rounded-md bg-ember hover:bg-ember/80 text-ink-950 font-medium text-[13px] transition">Save</button>
      <span id="wa-msg" class="font-mono text-[12px] text-ink-500"></span>
    </div>
    <p class="mt-2 text-[11px] text-ink-600 font-mono">Used in the registration flow so new users can contact you for approval.</p>
  </div>

  <!-- User management -->
  <div class="mb-10">
    <div class="font-mono text-[11px] uppercase tracking-[0.22em] text-ink-500 mb-4">Users</div>
    <div id="users-wrap" class="rounded-xl ring-1 ring-ink-800 overflow-hidden bg-ink-900/40">
      <div class="flex items-center justify-center py-10 gap-3 text-ink-500">
        <span class="inline-block w-4 h-4 border-2 border-ink-700 border-t-ember rounded-full spin"></span> Loading…
      </div>
    </div>
  </div>

  <!-- Delete -->
  <div>
    <div class="font-mono text-[11px] uppercase tracking-[0.22em] text-ink-500 mb-4">Delete Segment</div>
    <div class="rounded-xl ring-1 ring-ink-800 bg-ink-900/40 p-5 flex flex-wrap gap-3 items-center">
      <input type="number" id="del-id" placeholder="Post ID" min="1"
        class="w-28 bg-ink-900 ring-1 ring-ink-700 rounded-md px-3 py-2 text-[14px] text-ink-100 outline-none focus:ring-ember/50">
      <input type="text" id="del-key" placeholder="API Key"
        class="flex-1 min-w-[200px] bg-ink-900 ring-1 ring-ink-700 rounded-md px-3 py-2 text-[14px] text-ink-100 outline-none focus:ring-ember/50">
      <button onclick="deletePost()"
        class="h-10 px-5 rounded-md bg-live hover:bg-live/80 text-ink-100 font-medium text-[13px] transition">Delete</button>
      <span id="del-msg" class="font-mono text-[12px] text-ink-500"></span>
    </div>
  </div>
</div>

<script>
function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function relTime(ts){
  const d=(Date.now()-new Date(ts))/1000;
  if(d<3600) return Math.floor(d/60)+'m ago';
  if(d<86400) return Math.floor(d/3600)+'h ago';
  if(d<604800) return Math.floor(d/86400)+'d ago';
  return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

async function loadStats() {
  try {
    const r = await fetch('/api/stats');
    const d = await r.json();
    document.getElementById('stats').innerHTML = `
      <div class="rounded-xl ring-1 ring-ink-800 bg-ink-900/40 p-6 text-center">
        <div class="font-serif text-4xl text-ember mb-1">${d.total_posts}</div>
        <div class="font-mono text-[10px] uppercase tracking-[0.18em] text-ink-500">Total Segments</div>
      </div>
      <div class="rounded-xl ring-1 ring-ink-800 bg-ink-900/40 p-6 text-center">
        <div class="font-serif text-xl text-ink-100 mb-1">${d.last_post ? relTime(d.last_post) : '—'}</div>
        <div class="font-mono text-[10px] uppercase tracking-[0.18em] text-ink-500">Last Published</div>
      </div>
      <div class="rounded-xl ring-1 ring-ink-800 bg-ink-900/40 p-6 text-center">
        <div class="font-serif text-4xl text-ink-100 mb-1">${Object.values(d.by_source||{}).reduce((a,b)=>a+b,0)}</div>
        <div class="font-mono text-[10px] uppercase tracking-[0.18em] text-ink-500">Auto-Published</div>
      </div>`;
  } catch { document.getElementById('stats').innerHTML = '<div class="col-span-3 text-center py-8 text-ink-500">Failed to load stats.</div>'; }
}

async function loadRecent() {
  try {
    const r = await fetch('/api/posts?limit=15');
    const d = await r.json();
    if (!d.posts?.length) {
      document.getElementById('recent').innerHTML = '<div class="text-center py-8 text-ink-500 text-sm">No segments yet.</div>';
      return;
    }
    document.getElementById('recent').innerHTML = `
      <table class="w-full text-[13px]">
        <thead>
          <tr class="border-b border-ink-800">
            <th class="text-left px-4 py-3 font-mono text-[10px] uppercase tracking-[0.16em] text-ink-600">ID</th>
            <th class="text-left px-4 py-3 font-mono text-[10px] uppercase tracking-[0.16em] text-ink-600">Title</th>
            <th class="text-left px-4 py-3 font-mono text-[10px] uppercase tracking-[0.16em] text-ink-600 hidden md:table-cell">Show</th>
            <th class="text-left px-4 py-3 font-mono text-[10px] uppercase tracking-[0.16em] text-ink-600 hidden sm:table-cell">Published</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-ink-850">
          ${d.posts.map(p=>`
          <tr class="hover:bg-ink-900/60 transition">
            <td class="px-4 py-3 font-mono text-ink-600">${p.id}</td>
            <td class="px-4 py-3"><a href="/post/${p.id}" class="text-ink-100 hover:text-ember-soft transition line-clamp-1">${esc(p.title)}</a></td>
            <td class="px-4 py-3 text-ink-400 hidden md:table-cell">${p.categories?.[0] ? esc(p.categories[0]) : '—'}</td>
            <td class="px-4 py-3 font-mono text-[11px] text-ink-500 hidden sm:table-cell">${relTime(p.created_at)}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  } catch { document.getElementById('recent').innerHTML = '<div class="text-center py-8 text-ink-500">Failed to load segments.</div>'; }
}

async function deletePost() {
  const id = document.getElementById('del-id').value;
  const key = document.getElementById('del-key').value;
  const msg = document.getElementById('del-msg');
  if (!id || !key) { msg.textContent = 'Enter ID and API key.'; return; }
  try {
    const r = await fetch(`/api/posts/${id}`, { method:'DELETE', headers:{'Authorization':`Bearer ${key}`} });
    const d = await r.json();
    msg.textContent = r.ok ? '✓ Deleted' : `Error: ${d.error}`;
    msg.style.color = r.ok ? 'oklch(0.78 0.13 45)' : 'oklch(0.65 0.22 25)';
    if (r.ok) { loadStats(); loadRecent(); }
  } catch { msg.textContent = 'Request failed.'; }
}

async function logout() {
  await fetch('/api/auth/logout', { method: 'POST' });
  window.location.href = '/auth/login';
}

// ── Premium toggle ────────────────────────────────────────────────────────
let _isPremium = false;

function renderPremiumUI(premium) {
  _isPremium = premium;
  const label   = document.getElementById('mode-label');
  const badge   = document.getElementById('mode-badge');
  const desc    = document.getElementById('mode-desc');
  const btnLbl  = document.getElementById('toggle-label');

  if (premium) {
    label.textContent = 'Premium';
    badge.textContent = 'Active';
    badge.className = 'px-2 py-0.5 rounded font-mono text-[10px] uppercase tracking-widest bg-ember/20 text-ember ring-1 ring-ember/30';
    desc.textContent = '80 % of content is locked. Visitors must register or sign in to watch.';
    btnLbl.textContent = '⇢ Switch to Free';
  } else {
    label.textContent = 'Free';
    badge.textContent = 'Active';
    badge.className = 'px-2 py-0.5 rounded font-mono text-[10px] uppercase tracking-widest bg-ink-800 text-ink-400 ring-1 ring-ink-700';
    desc.textContent = 'All content is publicly accessible — no login required.';
    btnLbl.textContent = '⇢ Switch to Premium';
  }
}

async function loadPremium() {
  try {
    const r = await fetch('/api/settings/premium');
    const d = await r.json();
    renderPremiumUI(d.premium);
  } catch {
    document.getElementById('mode-label').textContent = 'Error';
  }
}

async function togglePremium() {
  const btn = document.getElementById('toggle-btn');
  btn.disabled = true;
  try {
    const r = await fetch('/api/settings/premium', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ enabled: !_isPremium }),
    });
    const d = await r.json();
    if (r.ok) renderPremiumUI(d.premium);
    else alert('Error: ' + (d.error || 'Unknown'));
  } catch { alert('Request failed.'); }
  finally { btn.disabled = false; }
}

// ── WhatsApp setting ──────────────────────────────────────────────────────
async function loadWhatsapp() {
  try {
    const r = await fetch('/api/settings/contact');
    const d = await r.json();
    if (d.whatsapp) document.getElementById('wa-number').value = d.whatsapp;
  } catch {}
}
async function saveWhatsapp() {
  const val = document.getElementById('wa-number').value.trim();
  const msg = document.getElementById('wa-msg');
  try {
    const r = await fetch('/api/admin/settings', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ admin_whatsapp: val }),
    });
    msg.textContent = r.ok ? '✓ Saved' : 'Error saving';
    msg.style.color = r.ok ? 'oklch(0.78 0.13 45)' : 'oklch(0.65 0.22 25)';
  } catch { msg.textContent = 'Request failed.'; }
}

// ── User management ───────────────────────────────────────────────────────
const STATUS_COLORS = {
  pending:  'bg-amber-900/30 text-amber-400 ring-amber-700/40',
  approved: 'bg-emerald-900/30 text-emerald-400 ring-emerald-700/40',
  rejected: 'bg-red-900/30 text-red-400 ring-red-700/40',
};

async function loadUsers() {
  try {
    const r = await fetch('/api/admin/users');
    const d = await r.json();
    const wrap = document.getElementById('users-wrap');
    if (!d.users?.length) {
      wrap.innerHTML = '<div class="text-center py-8 text-ink-500 text-sm">No registered users yet.</div>';
      return;
    }
    wrap.innerHTML = `
      <table class="w-full text-[13px]">
        <thead>
          <tr class="border-b border-ink-800">
            <th class="text-left px-4 py-3 font-mono text-[10px] uppercase tracking-[0.16em] text-ink-600">Email</th>
            <th class="text-left px-4 py-3 font-mono text-[10px] uppercase tracking-[0.16em] text-ink-600">Status</th>
            <th class="text-left px-4 py-3 font-mono text-[10px] uppercase tracking-[0.16em] text-ink-600 hidden sm:table-cell">Registered</th>
            <th class="px-4 py-3 font-mono text-[10px] uppercase tracking-[0.16em] text-ink-600">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-ink-850">
          ${d.users.map(u => `
          <tr class="hover:bg-ink-900/60 transition" id="user-row-${u.id}">
            <td class="px-4 py-3 text-ink-200">${esc(u.email)}</td>
            <td class="px-4 py-3">
              <span class="px-2 py-0.5 rounded font-mono text-[10px] uppercase tracking-widest ring-1 ${STATUS_COLORS[u.status]||STATUS_COLORS.pending}">
                ${u.status||'pending'}
              </span>
            </td>
            <td class="px-4 py-3 font-mono text-[11px] text-ink-500 hidden sm:table-cell">${relTime(u.created_at)}</td>
            <td class="px-4 py-3">
              <div class="flex items-center gap-2 flex-wrap">
                ${u.status !== 'approved' ? `<button onclick="approveUser(${u.id})"
                  class="h-7 px-3 rounded bg-emerald-900/40 hover:bg-emerald-800/60 text-emerald-400 font-mono text-[11px] ring-1 ring-emerald-700/40 transition">
                  Approve</button>` : ''}
                ${u.status !== 'rejected' ? `<button onclick="rejectUser(${u.id})"
                  class="h-7 px-3 rounded bg-red-900/30 hover:bg-red-800/50 text-red-400 font-mono text-[11px] ring-1 ring-red-700/40 transition">
                  Reject</button>` : ''}
                <a href="mailto:${esc(u.email)}?subject=Your msnow.click account has been approved!&body=Hi, your account on msnow.click has been approved. You can now sign in and watch all shows."
                  class="h-7 px-3 rounded bg-ink-800 hover:bg-ink-700 text-ink-300 font-mono text-[11px] ring-1 ring-ink-700 transition inline-flex items-center">
                  Email</a>
              </div>
            </td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  } catch { document.getElementById('users-wrap').innerHTML = '<div class="text-center py-8 text-ink-500">Failed to load users.</div>'; }
}

async function approveUser(id) {
  const r = await fetch(`/api/admin/users/${id}/approve`, { method: 'POST' });
  if (r.ok) loadUsers();
}
async function rejectUser(id) {
  const r = await fetch(`/api/admin/users/${id}/reject`, { method: 'POST' });
  if (r.ok) loadUsers();
}

loadWhatsapp();
loadPremium();
loadStats();
loadRecent();
loadUsers();
</script>
{% endblock %}
