{% extends "base.html" %}
{% block title %}Admin — NewsHub{% endblock %}

{% block content %}
<div class="admin-page">
    <div class="admin-header">
        <h1>Admin Dashboard</h1>
    </div>

    <div id="stats-grid" class="stats-grid">
        <div class="loading"> </div>
    </div>

    <div class="admin-section">
        <h2>Recent Posts</h2>
        <div id="recent-posts"></div>
    </div>

    <div class="admin-section">
        <h2>Delete Post</h2>
        <div class="delete-form">
            <input type="number" id="delete-id" placeholder="Post ID" min="1" style="width:120px">
            <input type="text" id="delete-api-key" placeholder="API Key" style="width:240px">
            <button onclick="deletePost()" class="btn-danger">Delete</button>
            <span id="delete-msg"></span>
        </div>
    </div>
</div>

<script>
    async function loadStats() {
        try {
            const res = await fetch('/api/stats');
            const data = await res.json();
            document.getElementById('stats-grid').innerHTML = `
                <div class="stat-card">
                    <div class="stat-number">${data.total_posts}</div>
                    <div class="stat-label">Total Posts</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${data.last_post ? fmtDate(data.last_post) : '—'}</div>
                    <div class="stat-label">Last Post</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${Object.values(data.by_source || {}).reduce((a,b)=>a+b,0)}</div>
                    <div class="stat-label">Automation Posts</div>
                </div>
            `;
        } catch {
            document.getElementById('stats-grid').innerHTML = '<div class="error">Failed to load stats.</div>';
        }
    }

    async function loadRecentPosts() {
        try {
            const res = await fetch('/api/posts?limit=15');
            const data = await res.json();
            if (!data.posts.length) {
                document.getElementById('recent-posts').innerHTML = '<p style="color:var(--text-muted)">No posts yet.</p>';
                return;
            }
            document.getElementById('recent-posts').innerHTML = `
                <table class="admin-table">
                    <thead><tr><th>ID</th><th>Title</th><th>Show</th><th>Date</th></tr></thead>
                    <tbody>${data.posts.map(p => `
                        <tr>
                            <td>${p.id}</td>
                            <td><a href="/post/${p.id}">${escHtml(p.title)}</a></td>
                            <td>${p.categories && p.categories.length ? escHtml(p.categories[0]) : '—'}</td>
                            <td>${fmtDate(p.created_at)}</td>
                        </tr>`).join('')}
                    </tbody>
                </table>`;
        } catch {
            document.getElementById('recent-posts').innerHTML = '<div class="error">Failed to load posts.</div>';
        }
    }

    async function deletePost() {
        const id = document.getElementById('delete-id').value;
        const key = document.getElementById('delete-api-key').value;
        const msg = document.getElementById('delete-msg');
        if (!id || !key) { msg.textContent = 'Enter post ID and API key.'; return; }
        try {
            const res = await fetch(`/api/posts/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${key}` }
            });
            const data = await res.json();
            msg.textContent = res.ok ? '✓ Deleted' : `Error: ${data.error}`;
            if (res.ok) { loadStats(); loadRecentPosts(); }
        } catch {
            msg.textContent = 'Request failed.';
        }
    }

    function escHtml(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    function fmtDate(ts) {
        return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    loadStats();
    loadRecentPosts();
</script>
{% endblock %}
