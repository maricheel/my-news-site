<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>{% block title %}NEWSGRID{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: { extend: {
    fontFamily: {
      sans: ['Geist','system-ui','sans-serif'],
      serif: ['"Instrument Serif"','Georgia','serif'],
      mono: ['"JetBrains Mono"','ui-monospace','monospace'],
    },
    colors: {
      ink: { 950:'oklch(0.14 0.008 65)',900:'oklch(0.17 0.009 65)',850:'oklch(0.20 0.010 65)',800:'oklch(0.24 0.011 65)',700:'oklch(0.32 0.011 65)',600:'oklch(0.45 0.011 65)',500:'oklch(0.58 0.011 70)',400:'oklch(0.70 0.010 75)',300:'oklch(0.82 0.008 80)',200:'oklch(0.90 0.006 80)',100:'oklch(0.96 0.005 85)' },
      ember: { DEFAULT:'oklch(0.72 0.18 38)',soft:'oklch(0.78 0.13 45)',deep:'oklch(0.55 0.18 32)' },
      live: 'oklch(0.65 0.22 25)',
    },
  }}
}
</script>
<style>
  html,body { background: oklch(0.14 0.008 65); }
  body { font-family:'Geist',system-ui,sans-serif; color:oklch(0.96 0.005 85); }
  ::selection { background:oklch(0.72 0.18 38 / 0.35); }
  .no-scrollbar::-webkit-scrollbar{display:none} .no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .fade-up{animation:fadeUp .35s ease-out both}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spin{animation:spin .8s linear infinite}
</style>
</head>
<body class="min-h-screen">

<header class="sticky top-0 z-40 bg-ink-950/90 backdrop-blur-xl border-b border-ink-800/70">
  <div class="max-w-[1400px] mx-auto px-4 md:px-8 h-16 flex items-center gap-6">
    <a href="/" class="flex items-center gap-2.5 shrink-0">
      <span class="relative inline-flex items-center justify-center w-7 h-7 rounded-sm bg-ember text-ink-950">
        <span class="font-serif text-[18px] leading-none translate-y-px">N</span>
        <span class="absolute -right-0.5 -bottom-0.5 w-1.5 h-1.5 rounded-full bg-ink-100 ring-2 ring-ink-950"></span>
      </span>
      <span class="font-serif text-[22px] leading-none text-ink-100 tracking-tight">NEWSGRID</span>
    </a>
    <nav class="flex items-center gap-1 text-[13px] text-ink-400 ml-2">
      <a href="/" class="px-3 py-2 rounded-md hover:text-ink-100 transition">Home</a>
      <a href="/admin" class="px-3 py-2 rounded-md hover:text-ink-100 transition">Admin</a>
    </nav>
    <form action="/search" method="get" class="flex-1 max-w-md ml-auto">
      <div class="flex items-center gap-2 h-10 rounded-md bg-ink-900 ring-1 ring-ink-800 hover:ring-ink-700 transition px-3">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" class="text-ink-500 shrink-0"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" name="q" value="{{ request.args.get('q','') }}" placeholder="Search shows, topics…"
          class="flex-1 bg-transparent outline-none text-[14px] placeholder:text-ink-600 text-ink-100">
      </div>
    </form>
  </div>
</header>

<main class="max-w-[1400px] mx-auto px-4 md:px-8 py-8 md:py-10">
  {% block content %}{% endblock %}
</main>

<footer class="border-t border-ink-800 mt-16">
  <div class="max-w-[1400px] mx-auto px-4 md:px-8 py-5 flex flex-wrap items-center justify-between gap-3 text-[11px] font-mono uppercase tracking-[0.18em] text-ink-600">
    <span>© 2026 NEWSGRID</span>
    <span>Built for the way news actually moves.</span>
  </div>
</footer>

</body>
</html>
