<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NEWSGRID — Video</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Geist', 'system-ui', 'sans-serif'],
          serif: ['"Instrument Serif"', 'Georgia', 'serif'],
          mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
        },
        colors: {
          ink: {
            950: 'oklch(0.14 0.008 65)',
            900: 'oklch(0.17 0.009 65)',
            850: 'oklch(0.20 0.010 65)',
            800: 'oklch(0.24 0.011 65)',
            700: 'oklch(0.32 0.011 65)',
            600: 'oklch(0.45 0.011 65)',
            500: 'oklch(0.58 0.011 70)',
            400: 'oklch(0.70 0.010 75)',
            300: 'oklch(0.82 0.008 80)',
            200: 'oklch(0.90 0.006 80)',
            100: 'oklch(0.96 0.005 85)',
          },
          ember: {
            DEFAULT: 'oklch(0.72 0.18 38)',
            soft: 'oklch(0.78 0.13 45)',
            deep: 'oklch(0.55 0.18 32)',
          },
          live: 'oklch(0.65 0.22 25)',
        },
      }
    }
  }
</script>

<style>
  html, body { background: oklch(0.14 0.008 65); }
  body { font-family: 'Geist', system-ui, sans-serif; color: oklch(0.96 0.005 85); }
  ::selection { background: oklch(0.72 0.18 38 / 0.35); }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  .scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: oklch(0.32 0.011 65); border-radius: 999px; }
  .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }

  @keyframes pulseDot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.55; transform: scale(0.85); }
  }
  .live-dot { animation: pulseDot 1.6s ease-in-out infinite; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-up { animation: fadeUp 0.35s ease-out both; }

  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  .thumb-stripes {
    background-image:
      repeating-linear-gradient(
        135deg,
        rgba(255,255,255,0.04) 0 14px,
        rgba(255,255,255,0.00) 14px 28px
      );
  }

  .editorial-rule {
    background-image: linear-gradient(
      to right,
      oklch(0.32 0.011 65) 0,
      oklch(0.32 0.011 65) 6px,
      transparent 6px,
      transparent 12px
    );
    background-size: 12px 1px;
    background-repeat: repeat-x;
  }
</style>
</head>
<body class="min-h-screen">

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

<script type="text/babel" src="newsgrid-data.jsx"></script>
<script type="text/babel" src="newsgrid-ui.jsx"></script>
<script type="text/babel" src="newsgrid-app.jsx"></script>

</body>
</html>
