<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ── Constants ─────────────────────────────────────────────────────────────
const CATEGORIES = [
  'All Shows',
  'Morning Joe',
  'Chris Jansing Reports',
  'Katy Tur Reports',
  'Deadline: White House',
  'The Beat With Ari Melber',
  'The Weeknight',
  'All In with Chris Hayes',
  'The Rachel Maddow Show',
  'The Briefing with Jen Psaki',
  'The Last Word with Lawrence O\'Donnell',
  'The 11th Hour with Stephanie Ruhle',
  'The Weekend',
  'Velshi',
  'Alex Witt Reports',
  'PoliticsNation with Al Sharpton',
  'The Weekend: Primetime',
];

const HOSTS = {
  'Morning Joe': 'Joe & Mika',
  'Chris Jansing Reports': 'Chris Jansing',
  'Katy Tur Reports': 'Katy Tur',
  'Deadline: White House': 'Nicolle Wallace',
  'The Beat With Ari Melber': 'Ari Melber',
  'The Weeknight': 'Symone, Alicia & Michael',
  'All In with Chris Hayes': 'Chris Hayes',
  'The Rachel Maddow Show': 'Rachel Maddow',
  'The Briefing with Jen Psaki': 'Jen Psaki',
  'The Last Word with Lawrence O\'Donnell': 'Lawrence O\'Donnell',
  'The 11th Hour with Stephanie Ruhle': 'Stephanie Ruhle',
  'The Weekend': 'Weekend Anchors',
  'Velshi': 'Ali Velshi',
  'Alex Witt Reports': 'Alex Witt',
  'PoliticsNation with Al Sharpton': 'Al Sharpton',
  'The Weekend: Primetime': 'Weekend Anchors',
};

const PALETTES = [
  ['oklch(0.34 0.06 30)', 'oklch(0.22 0.04 25)', 'oklch(0.55 0.13 35)'],
  ['oklch(0.30 0.04 250)', 'oklch(0.20 0.03 250)', 'oklch(0.48 0.08 245)'],
  ['oklch(0.32 0.05 145)', 'oklch(0.22 0.03 145)', 'oklch(0.50 0.09 140)'],
  ['oklch(0.34 0.05 80)', 'oklch(0.24 0.03 80)', 'oklch(0.55 0.10 75)'],
  ['oklch(0.30 0.04 320)', 'oklch(0.21 0.03 320)', 'oklch(0.48 0.10 315)'],
  ['oklch(0.32 0.03 210)', 'oklch(0.22 0.02 210)', 'oklch(0.50 0.06 205)'],
];

function relTime(ts) {
  const diff = (Date.now() - new Date(ts)) / 1000;
  if (diff < 3600)  return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  if (diff < 604800) return `${Math.floor(diff/86400)}d ago`;
  return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function stripHtml(html) {
  return html ? html.replace(/<[^>]*>/g, '').trim() : '';
}

// Map API post → UI video object
function postToVideo(post) {
  const cat = post.categories?.[0] || 'General';
  const seed = post.id % PALETTES.length;
  return {
    id: post.id,
    title: post.title,
    description: stripHtml(post.content).slice(0, 200),
    category: cat,
    host: HOSTS[cat] || 'Newsroom',
    chip: post.rumble_link ? 'Video' : 'Report',
    isLive: false,
    uploaded: relTime(post.created_at),
    thumbnail_url: post.thumbnail_url || null,
    thumbnail: { palette: PALETTES[seed], seed: post.id },
    rumble_link: post.rumble_link || null,
    content: post.content,
    categories: post.categories || [],
  };
}

// ── Icon ──────────────────────────────────────────────────────────────────
function Icon({ name, size = 18, className = '', strokeWidth = 1.75 }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !window.lucide) return;
    ref.current.innerHTML = '';
    const el = document.createElement('i');
    el.setAttribute('data-lucide', name);
    ref.current.appendChild(el);
    window.lucide.createIcons({ attrs: { width: size, height: size, 'stroke-width': strokeWidth }, nameAttr: 'data-lucide' });
  }, [name, size, strokeWidth]);
  return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} aria-hidden="true" />;
}

// ── Thumbnail ─────────────────────────────────────────────────────────────
function Thumbnail({ video, ratio = '16/9', overlay = true }) {
  const { palette, seed } = video.thumbnail;
  const [bg, mid, accent] = palette;
  const angle = 110 + ((seed * 37) % 60);
  const points = useMemo(() => {
    let s = (seed + 1) * 9301;
    const pts = [];
    for (let i = 0; i <= 12; i++) {
      s = (s * 1664525 + 1013904223) | 0;
      pts.push(`${(i/12)*320},${40 + (((s>>>0)%100)/100)*50}`);
    }
    return pts.join(' ');
  }, [seed]);

  return (
    <div className="relative w-full overflow-hidden bg-ink-900" style={{ aspectRatio: ratio }}>
      {video.thumbnail_url ? (
        <img src={video.thumbnail_url} alt="" className="absolute inset-0 w-full h-full object-cover" loading="lazy" />
      ) : (
        <svg viewBox="0 0 320 180" preserveAspectRatio="xMidYMid slice" className="absolute inset-0 w-full h-full">
          <defs>
            <linearGradient id={`g-${video.id}`} x1="0" y1="0" x2="1" y2="1" gradientTransform={`rotate(${angle},0.5,0.5)`}>
              <stop offset="0%" stopColor={bg} />
              <stop offset="55%" stopColor={mid} />
              <stop offset="100%" stopColor={accent} />
            </linearGradient>
            <pattern id={`s-${video.id}`} width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
              <rect width="14" height="14" fill="transparent" />
              <line x1="0" y1="0" x2="0" y2="14" stroke="rgba(255,255,255,0.05)" strokeWidth="1" />
            </pattern>
          </defs>
          <rect width="320" height="180" fill={`url(#g-${video.id})`} />
          <rect width="320" height="180" fill={`url(#s-${video.id})`} />
          <line x1="0" y1="120" x2="320" y2="120" stroke="rgba(255,255,255,0.06)" />
          <polyline fill="none" stroke="rgba(255,255,255,0.22)" strokeWidth="1.25" points={points} />
          <circle cx="296" cy="24" r="3" fill="rgba(255,255,255,0.55)" />
        </svg>
      )}

      {overlay && (
        <>
          <div className="absolute inset-0 bg-gradient-to-t from-ink-950/85 via-ink-950/15 to-transparent" />
          <div className="absolute left-3 bottom-3 right-3 flex items-end justify-between gap-2">
            <div className="font-mono text-[10px] uppercase tracking-[0.18em] leading-tight">
              <div className="text-ink-300/70">{video.category}</div>
              <div className="text-ink-100/95">{video.host}</div>
            </div>
          </div>
          <div className="absolute right-3 top-3">
            {video.rumble_link && (
              <span className="rounded-sm bg-ink-950/75 backdrop-blur-sm px-1.5 py-0.5 font-mono text-[10px] text-ink-100 ring-1 ring-white/10">▶ VIDEO</span>
            )}
          </div>
        </>
      )}
    </div>
  );
}

// ── HLS live stream URLs (tried in order until one works) ────────────────
const HLS_STREAMS = [
  'https://burgas.cdn.lncnetworks.host/hls/msnbc_live/index.m3u8',
  'https://gnome.cdn.livenewschat.eu/hls/msnbc_live/index.m3u8',
  'https://deutsch.cdn.lncnetworks.host/hls/msnbc_live/index.m3u8',
];

// ── Live Hero ─────────────────────────────────────────────────────────────
function LiveHero() {
  const videoRef = React.useRef(null);
  const hlsRef   = React.useRef(null);
  const [error, setError] = React.useState(false);

  React.useEffect(() => {
    const video = videoRef.current;
    if (!video) return;

    function tryStream(idx) {
      if (idx >= HLS_STREAMS.length) { setError(true); return; }
      const src = HLS_STREAMS[idx];

      if (typeof Hls !== 'undefined' && Hls.isSupported()) {
        if (hlsRef.current) hlsRef.current.destroy();
        const hls = new Hls({ enableWorker: false, lowLatencyMode: true });
        hlsRef.current = hls;
        hls.loadSource(src);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          video.muted = true;
          video.play().catch(() => {});
        });
        hls.on(Hls.Events.ERROR, (_, data) => {
          if (data.fatal) { hls.destroy(); tryStream(idx + 1); }
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        // Safari native HLS
        video.src = src;
        video.muted = true;
        video.play().catch(() => {});
      } else {
        setError(true);
      }
    }

    tryStream(0);
    return () => { if (hlsRef.current) hlsRef.current.destroy(); };
  }, []);

  const now = new Date().toLocaleString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric',
    hour: 'numeric', minute: '2-digit', timeZoneName: 'short',
  });

  // Hide entire section when stream is unavailable
  if (error) return null;

  return (
    <section className="relative overflow-hidden rounded-xl ring-1 ring-white/5 bg-ink-950">
      <div className="grid lg:grid-cols-[1.55fr_1fr]">

        {/* ── Player ── */}
        <div className="relative bg-black" style={{ aspectRatio: '16/9' }}>
          <video
            ref={videoRef}
            className="absolute inset-0 w-full h-full object-cover"
            muted playsInline autoPlay
          />
          {/* Live badge */}
          <div className="absolute top-4 left-4 z-10 pointer-events-none">
            <span className="inline-flex items-center gap-1.5 rounded-sm bg-live px-2.5 py-1 font-mono text-[11px] font-medium uppercase tracking-[0.18em] text-ink-100 shadow-lg">
              <span className="w-1.5 h-1.5 rounded-full bg-ink-100 live-dot" />
              LIVE
            </span>
          </div>
        </div>

        {/* ── Info panel ── */}
        <div className="relative p-6 md:p-10 lg:p-12 flex flex-col justify-center bg-gradient-to-br from-ink-900 to-ink-950">
          <div className="font-mono text-[11px] uppercase tracking-[0.22em] text-live mb-3 flex items-center gap-2">
            <span className="w-1.5 h-1.5 rounded-full bg-live live-dot" />
            Now Broadcasting
          </div>
          <h1 className="font-serif text-3xl md:text-4xl lg:text-[40px] leading-[1.05] text-ink-100">
            MSNBC Live
          </h1>
          <p className="mt-2 font-mono text-[12px] text-ink-500">{now}</p>
          <p className="mt-5 text-[15px] leading-relaxed text-ink-400 text-pretty">
            Live coverage of breaking news, politics, and analysis — 24 hours a day from MSNBC anchors and correspondents.
          </p>
          <div className="mt-8 pt-6 border-t border-ink-800 grid grid-cols-2 gap-4 text-[12px]">
            <div>
              <div className="font-mono uppercase tracking-[0.16em] text-ink-600 mb-1">Network</div>
              <div className="text-ink-200">MSNBC</div>
            </div>
            <div>
              <div className="font-mono uppercase tracking-[0.16em] text-ink-600 mb-1">Format</div>
              <div className="text-ink-200">Live Broadcast</div>
            </div>
          </div>
        </div>

      </div>
    </section>
  );
}

// ── Hero (kept for reference, replaced by LiveHero in BrowseView) ─────────

          <div className="absolute top-5 left-5">
            <span className="inline-flex items-center gap-1.5 rounded-sm bg-ember px-2.5 py-1 font-mono text-[11px] font-medium uppercase tracking-[0.18em] text-ink-950">FEATURED</span>

        </div>
        <div className="relative p-6 md:p-10 lg:p-12 flex flex-col justify-center bg-gradient-to-br from-ink-900 to-ink-950">
          <div className="font-mono text-[11px] uppercase tracking-[0.22em] text-ember-soft mb-3">
            The Lead · {new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })}
          </div>
          <h1 className="font-serif text-3xl md:text-4xl lg:text-[40px] leading-[1.05] text-ink-100 text-balance">
            {featured.title}
          </h1>
          <p className="mt-4 text-[15px] leading-relaxed text-ink-400 text-pretty max-w-prose">
            {featured.description || stripHtml(featured.content).slice(0, 160)}
          </p>
          <div className="mt-7 flex flex-wrap items-center gap-3">
            <button type="button" onClick={() => onOpen(featured)}
              className="group inline-flex items-center gap-2.5 h-11 px-5 rounded-md bg-ink-100 text-ink-950 font-medium text-[14px] hover:bg-white transition">
              <span className="relative inline-flex items-center justify-center w-5 h-5 rounded-full bg-ember text-ink-950">
                <Icon name="play" size={11} strokeWidth={2.5} />
              </span>
              {featured.rumble_link ? 'Watch video' : 'Read more'}
            </button>
          </div>
          <div className="mt-8 pt-6 border-t border-ink-800 grid grid-cols-3 gap-4 text-[12px]">
            <div>
              <div className="font-mono uppercase tracking-[0.16em] text-ink-600 mb-1">Anchor</div>
              <div className="text-ink-200">{featured.host}</div>
            </div>
            <div>
              <div className="font-mono uppercase tracking-[0.16em] text-ink-600 mb-1">Show</div>
              <div className="text-ink-200">{featured.category}</div>
            </div>
            <div>
              <div className="font-mono uppercase tracking-[0.16em] text-ink-600 mb-1">Updated</div>
              <div className="text-ink-200">{featured.uploaded}</div>
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

// ── Header ────────────────────────────────────────────────────────────────
function Header({ query, setQuery, onOpenMenu }) {
  const [focused, setFocused] = useState(false);
  return (
    <header className="sticky top-0 z-40 bg-ink-950/85 backdrop-blur-xl border-b border-ink-800/70">
      <div className="max-w-[1400px] mx-auto px-4 md:px-8 h-16 flex items-center gap-4 md:gap-8">
        <button type="button" onClick={onOpenMenu} className="md:hidden p-2 -ml-2 text-ink-300 hover:text-ink-100" aria-label="Menu">
          <Icon name="menu" size={20} />
        </button>
        <a href="#" className="flex items-center gap-2.5 shrink-0">
          <span className="relative inline-flex items-center justify-center w-7 h-7 rounded-sm bg-ember text-ink-950">
            <span className="font-serif text-[18px] leading-none translate-y-px">M</span>
            <span className="absolute -right-0.5 -bottom-0.5 w-1.5 h-1.5 rounded-full bg-ink-100 ring-2 ring-ink-950" />
          </span>
          <div className="flex items-baseline gap-1.5">
            <span className="font-serif text-[22px] leading-none text-ink-100 tracking-tight">msnow.click</span>
            <span className="hidden sm:inline font-mono text-[10px] uppercase tracking-[0.2em] text-ink-500 translate-y-px">/ live</span>
          </div>
        </a>

        <div className={`flex-1 max-w-xl ml-auto md:ml-0 transition-all ${focused ? 'md:max-w-2xl' : ''}`}>
          <label className={`group relative flex items-center gap-2 h-10 rounded-md bg-ink-900 ring-1 transition px-3 ${focused ? 'ring-ember/50 bg-ink-850' : 'ring-ink-800 hover:ring-ink-700'}`}>
            <Icon name="search" size={16} className="text-ink-500 group-focus-within:text-ember" />
            <input value={query} onChange={e => setQuery(e.target.value)}
              onFocus={() => setFocused(true)} onBlur={() => setFocused(false)}
              placeholder="Search shows, hosts, topics…"
              className="flex-1 bg-transparent outline-none text-[14px] placeholder:text-ink-600 text-ink-100" />
            {query && (
              <button type="button" onClick={() => setQuery('')} className="text-ink-500 hover:text-ink-200 p-1 -mr-1">
                <Icon name="x" size={14} />
              </button>
            )}
          </label>
        </div>

        <div className="hidden md:flex items-center gap-1 shrink-0">
          <a href="/admin" className="inline-flex items-center gap-2 h-9 px-3 rounded-md ring-1 ring-ink-700 hover:ring-ink-500 text-ink-300 hover:text-ink-100 text-[13px] transition">
            <Icon name="settings" size={14} />Admin
          </a>
        </div>
      </div>
    </header>
  );
}

// ── Category bar ──────────────────────────────────────────────────────────
function CategoryBar({ categories, active, setActive, counts }) {
  const scrollRef = useRef(null);
  const [edges, setEdges] = useState({ left: false, right: true });

  const updateEdges = useCallback(() => {
    const el = scrollRef.current;
    if (!el) return;
    setEdges({ left: el.scrollLeft > 4, right: el.scrollLeft + el.clientWidth < el.scrollWidth - 4 });
  }, []);

  useEffect(() => {
    updateEdges();
    const el = scrollRef.current;
    el?.addEventListener('scroll', updateEdges, { passive: true });
    window.addEventListener('resize', updateEdges);
    return () => { el?.removeEventListener('scroll', updateEdges); window.removeEventListener('resize', updateEdges); };
  }, [updateEdges]);

  const scrollBy = dir => scrollRef.current?.scrollBy({ left: dir * 300, behavior: 'smooth' });

  return (
    <div className="sticky top-16 z-30 bg-ink-950/85 backdrop-blur-xl border-b border-ink-800/70">
      <div className="relative max-w-[1400px] mx-auto px-4 md:px-8">
        <div className={`pointer-events-none absolute left-4 md:left-8 top-0 bottom-0 w-12 bg-gradient-to-r from-ink-950 to-transparent transition-opacity ${edges.left?'opacity-100':'opacity-0'}`} />
        <div className={`pointer-events-none absolute right-4 md:right-8 top-0 bottom-0 w-12 bg-gradient-to-l from-ink-950 to-transparent transition-opacity ${edges.right?'opacity-100':'opacity-0'}`} />
        <button onClick={() => scrollBy(-1)} className={`hidden md:flex items-center justify-center absolute left-1 top-1/2 -translate-y-1/2 w-7 h-7 rounded-full bg-ink-900 ring-1 ring-ink-800 text-ink-300 hover:text-ink-100 z-10 transition ${edges.left?'opacity-100':'opacity-0 pointer-events-none'}`}>
          <Icon name="chevron-left" size={14} />
        </button>
        <button onClick={() => scrollBy(1)} className={`hidden md:flex items-center justify-center absolute right-1 top-1/2 -translate-y-1/2 w-7 h-7 rounded-full bg-ink-900 ring-1 ring-ink-800 text-ink-300 hover:text-ink-100 z-10 transition ${edges.right?'opacity-100':'opacity-0 pointer-events-none'}`}>
          <Icon name="chevron-right" size={14} />
        </button>
        <div ref={scrollRef} className="no-scrollbar overflow-x-auto -mx-1 px-1">
          <div className="flex items-stretch min-w-max">
            {categories.map(c => (
              <CategoryChip key={c} label={c} count={counts[c]} active={active === c} onClick={() => setActive(c)} />
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Mobile drawer ─────────────────────────────────────────────────────────
function MobileDrawer({ open, onClose, categories, active, setActive, counts }) {
  return (
    <div className={`fixed inset-0 z-50 md:hidden ${open ? '' : 'pointer-events-none'}`}>
      <div className={`absolute inset-0 bg-ink-950/70 backdrop-blur-sm transition-opacity ${open?'opacity-100':'opacity-0'}`} onClick={onClose} />
      <aside className={`absolute left-0 top-0 bottom-0 w-[82%] max-w-sm bg-ink-900 border-r border-ink-800 transition-transform duration-300 ${open?'translate-x-0':'-translate-x-full'}`}>
        <div className="h-16 px-5 flex items-center justify-between border-b border-ink-800">
          <span className="font-serif text-xl text-ink-100">msnow.click</span>
          <button onClick={onClose} className="p-2 text-ink-300"><Icon name="x" /></button>
        </div>
        <div className="px-3 py-4 overflow-y-auto h-[calc(100%-4rem)] scrollbar-thin">
          <div className="px-2 pb-2 font-mono text-[10px] uppercase tracking-[0.18em] text-ink-600">Shows & sections</div>
          <ul className="space-y-1">
            {categories.map(c => (
              <li key={c}>
                <button onClick={() => { setActive(c); onClose(); }}
                  className={`w-full text-left flex items-center justify-between px-3 py-2.5 rounded-md text-[14px] transition ${active===c?'bg-ink-850 text-ink-100':'text-ink-300 hover:bg-ink-850/60 hover:text-ink-100'}`}>
                  <span className="inline-flex items-center gap-2">
                    {active===c && <span className="inline-block w-1 h-4 bg-ember rounded-full" />}{c}
                  </span>
                  <span className="font-mono text-[11px] text-ink-600">{counts[c]??0}</span>
                </button>
              </li>
            ))}
          </ul>
        </div>
      </aside>
    </div>
  );
}

// ── Section header ────────────────────────────────────────────────────────
function SectionHeader({ kicker, title }) {
  return (
    <div className="mb-5">
      {kicker && <div className="font-mono text-[11px] uppercase tracking-[0.22em] text-ember-soft mb-2">{kicker}</div>}
      <h2 className="font-serif text-2xl md:text-3xl text-ink-100 leading-none">{title}</h2>
    </div>
  );
}

// ── Browse view ───────────────────────────────────────────────────────────
function BrowseView({ videos, activeCategory, query, onOpen, featured }) {
  const showHero = activeCategory === 'All Shows' && !query && featured;
  return (
    <div className="space-y-12">
      {showHero && <LiveHero />}

      <section>
        <SectionHeader
          kicker={query ? `Results for "${query}"` : activeCategory === 'All Shows' ? 'Latest across every show' : `Latest from ${activeCategory}`}
          title={query ? `${videos.length} segment${videos.length!==1?'s':''}` : activeCategory === 'All Shows' ? 'Latest video' : activeCategory}
        />
        {videos.length === 0 ? (
          <div className="rounded-lg ring-1 ring-ink-800 bg-ink-900/40 p-12 text-center">
            <div className="inline-flex items-center justify-center w-12 h-12 rounded-full bg-ink-850 text-ink-400 mb-4">
              <Icon name="search-x" size={20} />
            </div>
            <div className="font-serif text-xl text-ink-100">Nothing matches that search.</div>
            <div className="text-ink-500 text-sm mt-1">Try a different term or select a different show.</div>
          </div>
        ) : (
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-x-5 gap-y-10">
            {videos.map(v => <VideoCard key={v.id} video={v} onOpen={onOpen} />)}
          </div>
        )}
      </section>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────
function App() {
  const [videos, setVideos] = useState([]);
  const [loading, setLoading] = useState(true);
  const [query, setQuery] = useState('');
  const [active, setActive] = useState('All Shows');
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [playing, setPlaying] = useState(null);

  useEffect(() => {
    fetch('/api/posts?limit=100&sort=newest')
      .then(r => r.json())
      .then(d => { setVideos((d.posts || []).map(postToVideo)); setLoading(false); })
      .catch(() => setLoading(false));
  }, []);

  // ⌘K shortcut
  useEffect(() => {
    const fn = e => {
      if ((e.metaKey||e.ctrlKey) && e.key.toLowerCase()==='k') { e.preventDefault(); document.querySelector('input[placeholder^="Search"]')?.focus(); }
      if (e.key==='Escape' && playing) setPlaying(null);
    };
    window.addEventListener('keydown', fn);
    return () => window.removeEventListener('keydown', fn);
  }, [playing]);

  const filtered = useMemo(() => {
    const q = query.trim().toLowerCase();
    return videos.filter(v => {
      if (active !== 'All Shows' && v.category !== active) return false;
      if (!q) return true;
      return v.title.toLowerCase().includes(q) || v.description.toLowerCase().includes(q) || v.host.toLowerCase().includes(q) || v.category.toLowerCase().includes(q);
    });
  }, [videos, query, active]);

  const counts = useMemo(() => {
    const c = { 'All Shows': videos.length };
    for (const v of videos) c[v.category] = (c[v.category]||0)+1;
    return c;
  }, [videos]);

  return (
    <div className="min-h-screen text-ink-100">
      <Header query={query} setQuery={setQuery} onOpenMenu={() => setDrawerOpen(true)} />
      <CategoryBar categories={CATEGORIES} active={active} setActive={c => { setActive(c); setPlaying(null); }} counts={counts} />
      <MobileDrawer open={drawerOpen} onClose={() => setDrawerOpen(false)} categories={CATEGORIES} active={active} setActive={setActive} counts={counts} />

      <main className="max-w-[1400px] mx-auto px-4 md:px-8 py-8 md:py-10">
        {loading ? (
          <div className="flex items-center justify-center py-32 gap-3 text-ink-400">
            <span className="inline-block w-5 h-5 border-2 border-ink-700 border-t-ember rounded-full spin" />
            Loading segments…
          </div>
        ) : playing ? (
          <WatchView video={playing} all={videos} onOpen={setPlaying} onClose={() => setPlaying(null)} />
        ) : (
          <BrowseView videos={filtered} activeCategory={active} query={query} onOpen={setPlaying} featured={videos[0]} />
        )}
      </main>

      <footer className="border-t border-ink-800 mt-16">
        <div className="max-w-[1400px] mx-auto px-4 md:px-8 py-10 grid md:grid-cols-4 gap-8 text-[13px]">
          <div className="md:col-span-2">
            <div className="flex items-center gap-2.5">
              <span className="relative inline-flex items-center justify-center w-7 h-7 rounded-sm bg-ember text-ink-950">
                <span className="font-serif text-[18px] leading-none translate-y-px">M</span>
              </span>
              <span className="font-serif text-xl text-ink-100">msnow.click</span>
            </div>
            <p className="mt-3 text-ink-500 max-w-sm">Daily political coverage from every MSNBC show. Auto-updated every 15 minutes.</p>
          </div>
          <div>
            <div className="font-mono text-[10px] uppercase tracking-[0.18em] text-ink-600 mb-3">Shows</div>
            <ul className="space-y-2 text-ink-400">
              {CATEGORIES.slice(1,5).map(c => <li key={c}><button className="hover:text-ink-100 text-left">{c}</button></li>)}
            </ul>
          </div>
          <div>
            <div className="font-mono text-[10px] uppercase tracking-[0.18em] text-ink-600 mb-3">Site</div>
            <ul className="space-y-2 text-ink-400">
              <li><a href="/admin" className="hover:text-ink-100">Admin</a></li>
            </ul>
          </div>
        </div>
        <div className="border-t border-ink-850">
          <div className="max-w-[1400px] mx-auto px-4 md:px-8 py-5 flex flex-wrap items-center justify-between gap-3 text-[11px] font-mono uppercase tracking-[0.18em] text-ink-600">
            <span>© 2026 msnow.click</span>
            <span>Built for the way news actually moves.</span>
          </div>
        </div>
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
