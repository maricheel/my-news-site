{% extends "base.html" %}

{% block title %}News Hub - Latest Posts{% endblock %}

{% block content %}
<section class="hero">
    <h1>Welcome to News Hub</h1>
    <p>Your source for the latest news and updates</p>
</section>

<div class="filters">
    <button class="filter-btn active" data-category="">All Posts</button>
    <button class="filter-btn" data-category="24">Category 24</button>
    <button class="filter-btn" data-category="39">Category 39</button>
    <button class="filter-btn" data-category="100">Category 100</button>
</div>

<div id="posts-grid" class="posts-grid">
    <div class="loading">Loading posts...</div>
</div>

<div id="pagination" class="pagination"></div>

<script>
    let currentPage = 1;
    let currentCategory = '';
    let currentSort = 'newest';

    async function loadPosts(page = 1, category = '', sort = 'newest') {
        const grid = document.getElementById('posts-grid');
        grid.innerHTML = '<div class="loading">Loading posts...</div>';

        try {
            let url = `/api/posts?page=${page}&limit=12&sort=${sort}`;
            if (category) url += `&category=${category}`;

            const res = await fetch(url);
            const data = await res.json();

            if (data.posts.length === 0) {
                grid.innerHTML = '<div class="no-posts">No posts found.</div>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            grid.innerHTML = data.posts.map(post => `
                <article class="post-card">
                    <a href="/post/${post.id}" class="post-card-link">
                        <div class="post-card-body">
                            <h2 class="post-card-title">${escapeHtml(post.title)}</h2>
                            <p class="post-card-excerpt">${getExcerpt(post.content)}</p>
                            <div class="post-card-meta">
                                <span class="post-date">${formatDate(post.created_at)}</span>
                                ${post.rumble_link ? '<span class="has-video">▶ Video</span>' : ''}
                            </div>
                        </div>
                    </a>
                </article>
            `).join('');

            renderPagination(data.page, data.pages);
        } catch (err) {
            grid.innerHTML = '<div class="error">Failed to load posts. Please try again.</div>';
        }
    }

    function renderPagination(current, total) {
        const el = document.getElementById('pagination');
        if (total <= 1) { el.innerHTML = ''; return; }

        let html = '';
        if (current > 1) html += `<button onclick="changePage(${current - 1})">← Prev</button>`;
        html += `<span>Page ${current} of ${total}</span>`;
        if (current < total) html += `<button onclick="changePage(${current + 1})">Next →</button>`;
        el.innerHTML = html;
    }

    function changePage(page) {
        currentPage = page;
        loadPosts(currentPage, currentCategory, currentSort);
        window.scrollTo(0, 0);
    }

    function getExcerpt(html) {
        const text = html.replace(/<[^>]*>/g, '');
        return text.length > 120 ? text.slice(0, 120) + '...' : text;
    }

    function escapeHtml(str) {
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
    }

    function formatDate(ts) {
        return new Date(ts).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCategory = btn.dataset.category;
            currentPage = 1;
            loadPosts(currentPage, currentCategory, currentSort);
        });
    });

    loadPosts();
</script>
{% endblock %}
