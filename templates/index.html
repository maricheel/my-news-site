{% extends "base.html" %}
{% block title %}NewsHub — Latest Coverage{% endblock %}

{% block content %}
<div class="category-strip">
    <div class="category-scroll">
        <button class="cat-btn active" data-category="">All Shows</button>
        <button class="cat-btn" data-category="Morning Joe">Morning Joe</button>
        <button class="cat-btn" data-category="Chris Jansing Reports">Chris Jansing</button>
        <button class="cat-btn" data-category="Katy Tur Reports">Katy Tur</button>
        <button class="cat-btn" data-category="Deadline: White House">Deadline: White House</button>
        <button class="cat-btn" data-category="The Beat With Ari Melber">The Beat</button>
        <button class="cat-btn" data-category="The Weeknight">The Weeknight</button>
        <button class="cat-btn" data-category="All In with Chris Hayes">All In</button>
        <button class="cat-btn" data-category="The Rachel Maddow Show">Rachel Maddow</button>
        <button class="cat-btn" data-category="The Briefing with Jen Psaki">Jen Psaki</button>
        <button class="cat-btn" data-category="The Last Word with Lawrence O'Donnell">Lawrence O'Donnell</button>
        <button class="cat-btn" data-category="The 11th Hour with Stephanie Ruhle">11th Hour</button>
        <button class="cat-btn" data-category="The Weekend">The Weekend</button>
        <button class="cat-btn" data-category="Velshi">Velshi</button>
        <button class="cat-btn" data-category="Alex Witt Reports">Alex Witt</button>
        <button class="cat-btn" data-category="PoliticsNation with Al Sharpton">PoliticsNation</button>
        <button class="cat-btn" data-category="The Weekend: Primetime">Weekend Primetime</button>
    </div>
</div>

<div class="hero">
    <div>
        <h1>Latest Coverage</h1>
        <p>Auto-updated every 45 minutes</p>
    </div>
    <select class="sort-select" id="sort-select">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
    </select>
</div>

<div id="posts-grid" class="posts-grid">
    <div class="loading"> </div>
</div>

<div id="pagination" class="pagination"></div>

<script>
    let currentPage = 1;
    let currentCategory = '';
    let currentSort = 'newest';

    async function loadPosts(page = 1, category = '', sort = 'newest') {
        document.getElementById('posts-grid').innerHTML = '<div class="loading"> </div>';

        try {
            let url = `/api/posts?page=${page}&limit=12&sort=${sort}`;
            if (category) url += `&category=${encodeURIComponent(category)}`;

            const res = await fetch(url);
            const data = await res.json();

            if (!data.posts || data.posts.length === 0) {
                document.getElementById('posts-grid').innerHTML = '<div class="no-posts">No posts found for this show yet.</div>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            document.getElementById('posts-grid').innerHTML = data.posts.map(post => `
                <article class="post-card">
                    <a href="/post/${post.id}" class="post-card-link">
                        <div class="post-card-thumb">
                            ${post.thumbnail_url
                                ? `<img src="${post.thumbnail_url}" alt="" loading="lazy">`
                                : `<div class="thumb-placeholder">📺</div>`
                            }
                        </div>
                        <div class="post-card-body">
                            ${post.categories && post.categories.length
                                ? `<div class="post-card-show">${escHtml(post.categories[0])}</div>`
                                : ''
                            }
                            <h2 class="post-card-title">${escHtml(post.title)}</h2>
                            <div class="post-card-meta">
                                <span>${fmtDate(post.created_at)}</span>
                                ${post.rumble_link ? '<span class="has-video">▶ Video</span>' : ''}
                            </div>
                        </div>
                    </a>
                </article>
            `).join('');

            renderPagination(data.page, data.pages);

        } catch (err) {
            document.getElementById('posts-grid').innerHTML = '<div class="error">Failed to load posts. Please try again.</div>';
        }
    }

    function renderPagination(current, total) {
        const el = document.getElementById('pagination');
        if (total <= 1) { el.innerHTML = ''; return; }
        let h = '';
        if (current > 1) h += `<button onclick="changePage(${current - 1})">← Prev</button>`;
        h += `<span>Page ${current} of ${total}</span>`;
        if (current < total) h += `<button onclick="changePage(${current + 1})">Next →</button>`;
        el.innerHTML = h;
    }

    function changePage(p) {
        currentPage = p;
        loadPosts(currentPage, currentCategory, currentSort);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function escHtml(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    function fmtDate(ts) {
        return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    // Category buttons
    document.querySelectorAll('.cat-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCategory = btn.dataset.category;
            currentPage = 1;
            loadPosts(currentPage, currentCategory, currentSort);
        });
    });

    // Sort select
    document.getElementById('sort-select').addEventListener('change', e => {
        currentSort = e.target.value;
        currentPage = 1;
        loadPosts(currentPage, currentCategory, currentSort);
    });

    loadPosts();
</script>
{% endblock %}
