            900: 'oklch(0.17 0.009 65)',
            850: 'oklch(0.20 0.010 65)',
            800: 'oklch(0.24 0.011 65)',
            700: 'oklch(0.32 0.011 65)',
            600: 'oklch(0.45 0.011 65)',
            500: 'oklch(0.58 0.011 70)',
            400: 'oklch(0.70 0.010 75)',
            300: 'oklch(0.82 0.008 80)',
            200: 'oklch(0.90 0.006 80)',
            100: 'oklch(0.96 0.005 85)',
          },
          ember: {
            DEFAULT: 'oklch(0.72 0.18 38)',
            soft: 'oklch(0.78 0.13 45)',
            deep: 'oklch(0.55 0.18 32)',

<style>
  html, body { background: oklch(0.14 0.008 65); }
  body { font-family: 'Geist', system-ui, sans-serif; color: oklch(0.96 0.005 85); }
  ::selection { background: oklch(0.72 0.18 38 / 0.35); }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  .scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: oklch(0.32 0.011 65); border-radius: 999px; }
  .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
  @keyframes pulseDot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.55;transform:scale(.85)} }
  .live-dot { animation: pulseDot 1.6s ease-in-out infinite; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .fade-up { animation: fadeUp 0.35s ease-out both; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .spin { animation: spin 0.8s linear infinite; }

  /* ── Light mode ─────────────────────────────────────────────────────────── */

  html.light .bg-ink-950{background-color:#f5f4f1!important}
  html.light .bg-ink-900{background-color:#edece8!important}
  html.light .bg-ink-850{background-color:#e4e3df!important}

  /* Opacity bg variants */
  html.light .bg-ink-950\/85{background-color:rgba(245,244,241,.92)!important}
  html.light .bg-ink-950\/70{background-color:rgba(245,244,241,.78)!important}
  html.light .bg-ink-950\/40{background-color:rgba(245,244,241,.45)!important}
  html.light .bg-ink-950\/35{background-color:rgba(245,244,241,.40)!important}
  html.light .bg-ink-900\/60{background-color:rgba(237,236,232,.65)!important}
  html.light .bg-ink-900\/40{background-color:rgba(237,236,232,.45)!important}
  html.light .bg-ink-900\/70{background-color:rgba(237,236,232,.78)!important}
  html.light .bg-ink-850\/60{background-color:rgba(228,227,223,.65)!important}
  /* Text */

  html.light .text-ink-200{color:#2e2e34!important}

  /* Borders */
  html.light .border-ink-800{border-color:#cccbc7!important}
  html.light .border-ink-850{border-color:#d4d3cf!important}
  html.light .divide-ink-850>*+*{border-color:#d4d3cf!important}
  /* Rings */
  html.light .ring-ink-800{--tw-ring-color:#cccbc7!important}
  html.light .ring-ink-700{--tw-ring-color:#b8b7b3!important}
  html.light .ring-ink-500{--tw-ring-color:#96969e!important}
  html.light .ring-white\/5{--tw-ring-color:rgba(0,0,0,.07)!important}
  html.light .ring-white\/10{--tw-ring-color:rgba(0,0,0,.10)!important}
  html.light .ring-white\/15{--tw-ring-color:rgba(0,0,0,.12)!important}
  /* Gradients */
  html.light .from-ink-900{--tw-gradient-from:#edece8 var(--tw-gradient-from-position)!important}
  html.light .to-ink-950{--tw-gradient-to:#f5f4f1 var(--tw-gradient-to-position)!important}
  html.light .from-ink-950\/85{--tw-gradient-from:rgba(245,244,241,.85) var(--tw-gradient-from-position)!important}
  html.light .from-ink-950\/75{--tw-gradient-from:rgba(245,244,241,.75) var(--tw-gradient-from-position)!important}
  /* Hover states */
  html.light .hover\:bg-ink-900:hover{background-color:#edece8!important}
  html.light .hover\:bg-ink-850\/60:hover{background-color:rgba(228,227,223,.65)!important}
  /* Scrollbar */
  html.light .scrollbar-thin::-webkit-scrollbar-thumb{background:#c8c7c3}
  /* Hide category-bar edge fades in light mode (gradient colour mismatch) */
  html.light .cat-fade{opacity:0!important;pointer-events:none}
  /* Free-show highlight glow */
  @keyframes freeGlowDark{
    0%  {box-shadow:0 0 0 0 oklch(0.72 0.18 38/0),  0 0 0px  oklch(0.72 0.18 38/0)}
    25% {box-shadow:0 0 0 3px oklch(0.72 0.18 38/.9),0 0 40px oklch(0.72 0.18 38/.45)}
    75% {box-shadow:0 0 0 3px oklch(0.72 0.18 38/.9),0 0 40px oklch(0.72 0.18 38/.45)}
    100%{box-shadow:0 0 0 0 oklch(0.72 0.18 38/0),  0 0 0px  oklch(0.72 0.18 38/0)}
  }
  @keyframes freeGlowLight{
    0%  {box-shadow:0 0 0 0 rgba(0,0,0,0),   0 0 0px  rgba(0,0,0,0)}
    25% {box-shadow:0 0 0 3px rgba(0,0,0,.7),0 0 28px rgba(0,0,0,.18)}
    75% {box-shadow:0 0 0 3px rgba(0,0,0,.7),0 0 28px rgba(0,0,0,.18)}
    100%{box-shadow:0 0 0 0 rgba(0,0,0,0),   0 0 0px  rgba(0,0,0,0)}
  }
  .free-glow      {animation:freeGlowDark  2.4s ease-in-out;border-radius:6px}
  html.light .free-glow{animation:freeGlowLight 2.4s ease-in-out!important}
</style>
<script>
  /* Apply stored theme before first paint to avoid flash */
  (function(){
    try{ if(localStorage.getItem('theme')==='light') document.documentElement.classList.add('light'); }catch(e){}
  })();
  /* Register service worker */
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/static/sw.js').catch(() => {});
    });
  }
</script>

<body class="min-h-screen">
<div id="root"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.15/dist/hls.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ── Constants ─────────────────────────────────────────────────────────────
const CATEGORIES = [
  'All Shows',
  'Morning Joe',
  'Chris Jansing Reports',
  'Katy Tur Reports',
  'Deadline: White House',
  'The Beat With Ari Melber',
  'The Weeknight',
  'All In with Chris Hayes',
  'The Rachel Maddow Show',
  'The Briefing with Jen Psaki',
  'The Last Word with Lawrence O\'Donnell',
  'The 11th Hour with Stephanie Ruhle',
  'The Weekend',
  'Velshi',
  'Alex Witt Reports',
  'PoliticsNation with Al Sharpton',
  'The Weekend: Primetime',
];

const HOSTS = {
  'Morning Joe': 'Joe & Mika',
  'Chris Jansing Reports': 'Chris Jansing',
  'Katy Tur Reports': 'Katy Tur',
  'Deadline: White House': 'Nicolle Wallace',
  'The Beat With Ari Melber': 'Ari Melber',
  'The Weeknight': 'Symone, Alicia & Michael',
  'All In with Chris Hayes': 'Chris Hayes',
  'The Rachel Maddow Show': 'Rachel Maddow',
  'The Briefing with Jen Psaki': 'Jen Psaki',
  'The Last Word with Lawrence O\'Donnell': 'Lawrence O\'Donnell',
  'The 11th Hour with Stephanie Ruhle': 'Stephanie Ruhle',
  'The Weekend': 'Weekend Anchors',
  'Velshi': 'Ali Velshi',
  'Alex Witt Reports': 'Alex Witt',
  'PoliticsNation with Al Sharpton': 'Al Sharpton',
  'The Weekend: Primetime': 'Weekend Anchors',
};

const PALETTES = [
  ['oklch(0.34 0.06 30)', 'oklch(0.22 0.04 25)', 'oklch(0.55 0.13 35)'],
  ['oklch(0.30 0.04 250)', 'oklch(0.20 0.03 250)', 'oklch(0.48 0.08 245)'],
  ['oklch(0.32 0.05 145)', 'oklch(0.22 0.03 145)', 'oklch(0.50 0.09 140)'],
  ['oklch(0.34 0.05 80)', 'oklch(0.24 0.03 80)', 'oklch(0.55 0.10 75)'],
  ['oklch(0.30 0.04 320)', 'oklch(0.21 0.03 320)', 'oklch(0.48 0.10 315)'],
  ['oklch(0.32 0.03 210)', 'oklch(0.22 0.02 210)', 'oklch(0.50 0.06 205)'],
];

function relTime(ts) {
  const diff = (Date.now() - new Date(ts)) / 1000;
  if (diff < 3600)  return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  if (diff < 604800) return `${Math.floor(diff/86400)}d ago`;
  return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function stripHtml(html) {
  return html ? html.replace(/<[^>]*>/g, '').trim() : '';
}

// Map API post → UI video object
function extractEmbedSrc(html) {
  // Pull the src from any <iframe> inside the WordPress content
  const m = html.match(/src=["']([^"']+)["']/i);
  if (!m) return null;
  let src = m[1];
  if (src.startsWith('//')) src = 'https:' + src;
  return src;
}

function postToVideo(post) {
  const cat = post.categories?.[0] || 'General';
  const seed = post.id % PALETTES.length;
  const embedSrc = post.rumble_link || extractEmbedSrc(post.content) || null;
  return {
    id: post.id,
    title: post.title,
    description: stripHtml(post.content).slice(0, 200),
    category: cat,
    host: HOSTS[cat] || 'Newsroom',
    chip: embedSrc ? 'Video' : 'Report',
    isLive: false,
    uploaded: relTime(post.created_at),
    thumbnail_url: post.thumbnail_url || null,
    thumbnail: { palette: PALETTES[seed], seed: post.id },
    rumble_link: post.rumble_link || null,
    embed_src: embedSrc,
    content: post.content,
    categories: post.categories || [],
    created_at: post.created_at || null,
  };
}

// ── Icon ──────────────────────────────────────────────────────────────────
function Icon({ name, size = 18, className = '', strokeWidth = 1.75 }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !window.lucide) return;
    ref.current.innerHTML = '';
    const el = document.createElement('i');
    el.setAttribute('data-lucide', name);
    ref.current.appendChild(el);
    window.lucide.createIcons({ attrs: { width: size, height: size, 'stroke-width': strokeWidth }, nameAttr: 'data-lucide' });
  }, [name, size, strokeWidth]);
  return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} aria-hidden="true" />;
}

// ── Thumbnail ─────────────────────────────────────────────────────────────
function Thumbnail({ video, ratio = '16/9', overlay = true }) {
  const { palette, seed } = video.thumbnail;
  const [bg, mid, accent] = palette;
  const angle = 110 + ((seed * 37) % 60);
  const points = useMemo(() => {
    let s = (seed + 1) * 9301;
    const pts = [];
    for (let i = 0; i <= 12; i++) {
      s = (s * 1664525 + 1013904223) | 0;
      pts.push(`${(i/12)*320},${40 + (((s>>>0)%100)/100)*50}`);
    }
    return pts.join(' ');
  }, [seed]);

  return (
    <div className="relative w-full overflow-hidden bg-ink-900" style={{ aspectRatio: ratio }}>
      {video.thumbnail_url ? (
        <img src={video.thumbnail_url} alt="" className="absolute inset-0 w-full h-full object-cover" loading="lazy" />
      ) : (
        <svg viewBox="0 0 320 180" preserveAspectRatio="xMidYMid slice" className="absolute inset-0 w-full h-full">
          <defs>
            <linearGradient id={`g-${video.id}`} x1="0" y1="0" x2="1" y2="1" gradientTransform={`rotate(${angle},0.5,0.5)`}>
              <stop offset="0%" stopColor={bg} />
              <stop offset="55%" stopColor={mid} />
              <stop offset="100%" stopColor={accent} />
            </linearGradient>
            <pattern id={`s-${video.id}`} width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
              <rect width="14" height="14" fill="transparent" />
              <line x1="0" y1="0" x2="0" y2="14" stroke="rgba(255,255,255,0.05)" strokeWidth="1" />
            </pattern>
          </defs>
          <rect width="320" height="180" fill={`url(#g-${video.id})`} />
          <rect width="320" height="180" fill={`url(#s-${video.id})`} />
          <line x1="0" y1="120" x2="320" y2="120" stroke="rgba(255,255,255,0.06)" />
          <polyline fill="none" stroke="rgba(255,255,255,0.22)" strokeWidth="1.25" points={points} />
          <circle cx="296" cy="24" r="3" fill="rgba(255,255,255,0.55)" />
        </svg>
      )}

      {overlay && (
        <>
          <div className="absolute inset-0 bg-gradient-to-t from-ink-950/85 via-ink-950/15 to-transparent" />
          <div className="absolute left-3 bottom-3 right-3 flex items-end justify-between gap-2">
            <div className="font-mono text-[10px] uppercase tracking-[0.18em] leading-tight">
              <div className="text-ink-300/70">{video.category}</div>
              <div className="text-ink-100/95">{video.host}</div>
            </div>
          </div>
          <div className="absolute right-3 top-3">
            {video.embed_src && (
              <span className="rounded-sm bg-ink-950/75 backdrop-blur-sm px-1.5 py-0.5 font-mono text-[10px] text-ink-100 ring-1 ring-white/10">▶ VIDEO</span>
            )}
          </div>
        </>
      )}
    </div>
  );
}

// ── Play overlay ──────────────────────────────────────────────────────────
function PlayOverlay() {
  return (
    <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-200">
      <div className="absolute inset-0 bg-ink-950/35" />
      <div className="relative rounded-full bg-ink-100 text-ink-950 flex items-center justify-center shadow-2xl ring-1 ring-white/40" style={{ width: 56, height: 56 }}>
        <Icon name="play" size={22} />
      </div>
    </div>
  );
}

// ── Video card ─────────────────────────────────────────────────────────────
function VideoCard({ video, onOpen, locked, highlighted }) {
  return (
    <button type="button" id={`card-${video.id}`} onClick={() => onOpen(video)}
      className={`group text-left fade-up focus:outline-none focus-visible:ring-2 focus-visible:ring-ember/70 rounded-md ${highlighted ? 'free-glow' : ''}`}>
      <div className="relative overflow-hidden rounded-md ring-1 ring-white/5 group-hover:ring-white/15 transition">
        <Thumbnail video={video} />
        {locked ? (
          /* Lock overlay */
          <div className="absolute inset-0 flex flex-col items-center justify-center bg-ink-950/75 backdrop-blur-[2px]">
            <div className="rounded-full bg-ink-900/90 ring-1 ring-ink-700 flex items-center justify-center mb-1 sm:mb-2" style={{width:'clamp(28px,8vw,44px)',height:'clamp(28px,8vw,44px)'}}>
              <Icon name="lock" size={14} className="text-ember sm:hidden" />
              <Icon name="lock" size={18} className="text-ember hidden sm:block" />
            </div>
            <span className="font-mono text-[8px] sm:text-[10px] uppercase tracking-widest text-ink-300">Members only</span>
          </div>
        ) : (
          <PlayOverlay />
        )}
      </div>
      <div className="mt-2 sm:mt-3 space-y-1 sm:space-y-1.5">
        <div className="flex items-center gap-1.5 text-[10px] sm:text-[11px] font-mono uppercase tracking-[0.12em] text-ink-400 truncate">
          <span className={`shrink-0 ${locked ? 'text-ink-600' : 'text-ember-soft'}`}>{locked ? 'Premium' : video.chip}</span>
          <span className="text-ink-700 shrink-0">·</span>
          <span className="truncate">{video.category}</span>
        </div>
        <h3
          className={`text-[12px] sm:text-[15px] leading-snug font-medium line-clamp-2 transition-colors ${locked ? 'text-ink-500' : 'text-ink-100 group-hover:text-ember-soft'}`}
          style={{minHeight:'2.4rem', overflow:'hidden'}}
        >
          {video.title}
        </h3>
        <div className="flex items-center gap-1.5 text-[11px] sm:text-xs text-ink-500 truncate">
          <span className="truncate">{video.host}</span>
          <span className="text-ink-700 shrink-0">·</span>
          <span className="shrink-0">{video.uploaded}</span>
        </div>
      </div>
    </button>
  );
}

// ── Related card (sidebar) ────────────────────────────────────────────────
function RelatedCard({ video, onOpen, active, locked }) {
  return (
    <button type="button" onClick={() => onOpen(video)}
      className={`group w-full text-left flex gap-3 p-2 rounded-md transition ${active ? 'bg-ink-850 ring-1 ring-ember/30' : 'hover:bg-ink-900'}`}>
      <div className="relative w-36 shrink-0 overflow-hidden rounded ring-1 ring-white/5">
        <Thumbnail video={video} overlay={false} />
        <div className="absolute inset-0 bg-gradient-to-t from-ink-950/70 to-transparent" />
        {locked && (
          <div className="absolute inset-0 flex items-center justify-center bg-ink-950/60 backdrop-blur-[2px]">
            <Icon name="lock" size={16} className="text-ember" />
          </div>
        )}
      </div>
      <div className="min-w-0 flex-1">
        <div className="text-[10px] font-mono uppercase tracking-[0.14em] text-ember-soft truncate">{video.category}</div>
        <div className={`text-[13px] leading-snug line-clamp-2 mt-0.5 transition-colors ${locked ? 'text-ink-500' : 'text-ink-100 group-hover:text-ember-soft'}`}>{video.title}</div>
        <div className="text-[11px] text-ink-500 mt-1 font-mono">{video.uploaded}</div>
      </div>
    </button>
  );
}

// ── Category chip ─────────────────────────────────────────────────────────
function CategoryChip({ label, active, count, onClick, highlight }) {
  const textCls = highlight
    ? (active ? 'text-emerald-300' : 'text-emerald-500 hover:text-emerald-300')
    : (active ? 'text-ink-100'    : 'text-ink-400 hover:text-ink-200');
  const barCls  = highlight
    ? (active ? 'bg-emerald-400' : 'bg-transparent')
    : (active ? 'bg-ember'       : 'bg-transparent');
  const cntCls  = highlight
    ? (active ? 'text-emerald-400' : 'text-emerald-600')
    : (active ? 'text-ember-soft'  : 'text-ink-600');
  return (
    <button type="button" onClick={onClick}
      className={`relative whitespace-nowrap shrink-0 px-3 py-3 md:py-2 text-[13px] font-medium transition-colors ${textCls}`}>
      <span className="inline-flex items-center gap-1.5">
        {highlight && <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 opacity-80" />}
        {label}
        {typeof count === 'number' && (
          <span className={`font-mono text-[10px] tabular-nums ${cntCls}`}>{count}</span>
        )}
      </span>
      <span className={`pointer-events-none absolute left-2 right-2 -bottom-px h-px transition-colors ${barCls}`} />
    </button>
  );
}

// ── Watch view ────────────────────────────────────────────────────────────
function WatchView({ video, all, onOpen, onClose, isLocked }) {
  // Same calendar day as the video being watched
  const videoDay = useMemo(() => {
    if (!video.created_at) return null;
    const d = new Date(video.created_at);
    return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
  }, [video.created_at]);

  const related = useMemo(() => {
    return all
      .filter(v => {
        if (v.id === video.id) return false;
        if (!videoDay || !v.created_at) return false;
        const d = new Date(v.created_at);
        return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}` === videoDay;
      })
      .slice(0, 10);
  }, [video, all, videoDay]);

  useEffect(() => { window.scrollTo({ top: 0, behavior: 'smooth' }); }, [video.id]);

  return (
    <div className="fade-up">
      <button type="button" onClick={onClose}
        className="inline-flex items-center gap-2 mb-5 text-[13px] text-ink-400 hover:text-ink-100 transition">
        <Icon name="arrow-left" size={14} /> Back to all shows
      </button>

      <div className="grid lg:grid-cols-[1fr_360px] gap-8">
        <div>
          {/* Player */}
          {video.embed_src && (
            <div className="-mx-4 sm:mx-0 w-[calc(100%+2rem)] sm:w-full overflow-hidden sm:rounded-lg bg-ink-950 sm:ring-1 sm:ring-white/10" style={{ aspectRatio: '16/9' }}>
              <iframe
                src={video.embed_src}
                className="w-full h-full block"
                allowFullScreen frameBorder="0" scrolling="no"
              />
            </div>

const HLS_STREAMS = [
  'https://burgas.cdn.lncnetworks.host/hls/msnbc_live/index.m3u8',
  'https://gnome.cdn.livenewschat.eu/hls/msnbc_live/index.m3u8',

// ── Live Hero ─────────────────────────────────────────────────────────────
function LiveHero() {
  const videoRef = React.useRef(null);
  const hlsRef   = React.useRef(null);
  const [error, setError] = React.useState(false);

  React.useEffect(() => {
    const video = videoRef.current;
    if (!video) return;

    function tryStream(idx) {
      if (idx >= HLS_STREAMS.length) { setError(true); return; }
      const src = HLS_STREAMS[idx];

      if (typeof Hls !== 'undefined' && Hls.isSupported()) {
        if (hlsRef.current) hlsRef.current.destroy();
        const hls = new Hls({ enableWorker: false, lowLatencyMode: true });
        hlsRef.current = hls;
        hls.loadSource(src);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          video.muted = true;
          video.play().catch(() => {});
        });
        hls.on(Hls.Events.ERROR, (_, data) => {
          if (data.fatal) { hls.destroy(); tryStream(idx + 1); }
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        // Safari native HLS
        video.src = src;
        video.muted = true;
        video.play().catch(() => {});
      } else {
        setError(true);
      }
    }

    tryStream(0);
    return () => { if (hlsRef.current) hlsRef.current.destroy(); };
  }, []);

  const now = new Date().toLocaleString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric',
    hour: 'numeric', minute: '2-digit', timeZoneName: 'short',
  });

  // Hide entire section when stream is unavailable
  if (error) return null;

  return (
    <section className="relative overflow-hidden rounded-xl ring-1 ring-white/5 bg-ink-950">
      <div className="grid lg:grid-cols-[1.55fr_1fr]">

        {/* ── Player ── */}

          <video

            className="absolute inset-0 w-full h-full object-cover"
            muted playsInline autoPlay
          />
          {/* Live badge */}
          <div className="absolute top-4 left-4 z-10 pointer-events-none">
            <span className="inline-flex items-center gap-1.5 rounded-sm bg-live px-2.5 py-1 font-mono text-[11px] font-medium uppercase tracking-[0.18em] text-ink-100 shadow-lg">
              <span className="w-1.5 h-1.5 rounded-full bg-ink-100 live-dot" />
              LIVE
            </span>
          </div>
        </div>

        {/* ── Info panel ── */}
        <div className="relative p-6 md:p-10 lg:p-12 flex flex-col justify-center bg-gradient-to-br from-ink-900 to-ink-950">
          <div className="font-mono text-[11px] uppercase tracking-[0.22em] text-live mb-3 flex items-center gap-2">

          <h1 className="font-serif text-3xl md:text-4xl lg:text-[40px] leading-[1.05] text-ink-100">
            MSNOW Live
          </h1>
          <p className="mt-2 font-mono text-[12px] text-ink-500">{now}</p>
          <p className="mt-5 text-[15px] leading-relaxed text-ink-400 text-pretty">
            Live coverage of breaking news, politics, and analysis — 24 hours a day from MSNOW anchors and correspondents.

function CategoryBar({ categories, active, setActive, counts }) {
  const scrollRef = useRef(null);
  const [edges, setEdges] = useState({ left: false, right: true });

  const updateEdges = useCallback(() => {
    const el = scrollRef.current;
    if (!el) return;
    setEdges({ left: el.scrollLeft > 4, right: el.scrollLeft + el.clientWidth < el.scrollWidth - 4 });
  }, []);

  useEffect(() => {
    updateEdges();
    const el = scrollRef.current;
    el?.addEventListener('scroll', updateEdges, { passive: true });
    window.addEventListener('resize', updateEdges);
    return () => { el?.removeEventListener('scroll', updateEdges); window.removeEventListener('resize', updateEdges); };
  }, [updateEdges]);

  const scrollBy = dir => scrollRef.current?.scrollBy({ left: dir * 300, behavior: 'smooth' });

  return (
    <div className="sticky top-16 z-30 bg-ink-950/85 backdrop-blur-xl border-b border-ink-800/70">
      <div className="relative max-w-[1400px] mx-auto px-4 md:px-8">

        <div className={`cat-fade pointer-events-none absolute right-4 md:right-8 top-0 bottom-0 w-12 bg-gradient-to-l from-ink-950 to-transparent transition-opacity ${edges.right?'opacity-100':'opacity-0'}`} />
        <button onClick={() => scrollBy(-1)} className={`hidden md:flex items-center justify-center absolute left-1 top-1/2 -translate-y-1/2 w-7 h-7 rounded-full bg-ink-900 ring-1 ring-ink-800 text-ink-300 hover:text-ink-100 z-10 transition ${edges.left?'opacity-100':'opacity-0 pointer-events-none'}`}>
          <Icon name="chevron-left" size={14} />
        </button>
        <button onClick={() => scrollBy(1)} className={`hidden md:flex items-center justify-center absolute right-1 top-1/2 -translate-y-1/2 w-7 h-7 rounded-full bg-ink-900 ring-1 ring-ink-800 text-ink-300 hover:text-ink-100 z-10 transition ${edges.right?'opacity-100':'opacity-0 pointer-events-none'}`}>

        </div>
      </div>
    </div>
  );

    setError('');
    setLoading(true);
    const url = mode === 'login' ? '/api/auth/user-login' : '/api/auth/register';
    try {
      const r = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email.trim().toLowerCase(), password }),
      });
      const d = await r.json();
      if (r.ok) {
        setResolvedEmail(d.email);
        if (d.status === 'approved') {
          onSuccess(d.email, 'approved'); // closes modal, full access
        } else if (d.status === 'rejected') {
          setStep('rejected');
        } else {
          // pending — show contact CTA, update App state but keep modal open
          onSuccess(d.email, 'pending');
          setStep('pending');
        }
      } else {
        setError(d.error || 'Something went wrong.');
      }
    } catch {
      setError('Network error. Please try again.');
    } finally {
      setLoading(false);
    }
  };

  const userMail  = resolvedEmail || email;
  const waText    = encodeURIComponent(`Hello, I want the invoice please. My email is ${userMail}.`);
  const waLink    = `https://wa.me/${contact.whatsapp || ''}?text=${waText}`;
  const mailLink  = `mailto:${contact.email || ''}?subject=Invoice request - msnow.click&body=Hello, I want the invoice please. My email is ${userMail}.`;

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
      <div className="absolute inset-0 bg-ink-950/80 backdrop-blur-sm" onClick={step === 'form' ? onClose : undefined} />

      <div className="relative w-full max-w-sm rounded-2xl bg-ink-900 ring-1 ring-ink-800 p-8 fade-up">
        <button onClick={onClose} className="absolute top-4 right-4 text-ink-500 hover:text-ink-200 transition">
          <Icon name="x" size={18} />
        </button>

        {/* ── Pending step ── */}
        {step === 'pending' && (
          <div className="text-center">
            <div className="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-amber-900/30 ring-1 ring-amber-700/40 mb-5">
              <Icon name="clock" size={26} className="text-amber-400" />
            </div>
            <h2 className="font-serif text-2xl text-ink-100 mb-2">One last step!</h2>
            <p className="text-[13px] text-ink-400 mb-2">
              Your account is created. To activate it, send us a message to request your invoice.
            </p>
            <p className="text-[13px] text-ink-300 font-medium mb-6">
              Contact us via WhatsApp or Email:
            </p>
            <div className="space-y-3 mb-6">
              <a href={waLink} target="_blank" rel="noopener"
                className="flex items-center justify-center gap-2 w-full h-11 rounded-md bg-emerald-800/40 hover:bg-emerald-700/50 ring-1 ring-emerald-700/50 text-emerald-300 font-semibold text-[14px] transition">
                <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                Message on WhatsApp
              </a>
              <a href={mailLink}
                className="flex items-center justify-center gap-2 w-full h-11 rounded-md bg-ink-800 hover:bg-ink-700 ring-1 ring-ink-700 text-ink-200 font-semibold text-[14px] transition">
                <Icon name="mail" size={16} />
                Send Email
              </a>
            </div>
            <button onClick={onClose}
              className="w-full h-10 rounded-md ring-1 ring-ink-700 text-ink-400 hover:text-ink-100 text-[13px] transition">
              Continue watching free shows
            </button>
          </div>
        )}

        {/* ── Rejected step ── */}
        {step === 'rejected' && (
          <div className="text-center">
            <div className="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-red-900/30 ring-1 ring-red-700/40 mb-5">
              <Icon name="x-circle" size={26} className="text-red-400" />
            </div>
            <h2 className="font-serif text-2xl text-ink-100 mb-2">Access denied</h2>
            <p className="text-[13px] text-ink-400 mb-6">
              Your account request was not approved. Contact the admin if you think this is a mistake.
            </p>
            <a href={mailLink} className="flex items-center justify-center gap-2 w-full h-11 rounded-md bg-ink-800 hover:bg-ink-700 ring-1 ring-ink-700 text-ink-200 font-semibold text-[14px] transition mb-3">
              <Icon name="mail" size={16} />
              Contact Admin
            </a>
            <button onClick={onClose} className="w-full h-10 rounded-md ring-1 ring-ink-700 text-ink-400 hover:text-ink-100 text-[13px] transition">
              Close
            </button>
          </div>
        )}

        {/* ── Form step ── */}
        {step === 'form' && (<>
          <div className="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-ember/15 ring-1 ring-ember/30 mb-5">
            <Icon name="lock" size={22} className="text-ember" />
          </div>
          <h2 className="font-serif text-2xl text-ink-100 mb-1">
            {mode === 'login' ? 'Sign in' : 'Create account'}
          </h2>
          <p className="text-[13px] text-ink-500 mb-6">
            {mode === 'login' ? 'Access the full archive of every daily show.' : 'Register and request access from the admin.'}
          </p>

          <div className="flex rounded-md ring-1 ring-ink-800 overflow-hidden mb-6">
            <button onClick={() => { setMode('login'); setError(''); }}
              className={`flex-1 py-2 text-[13px] font-medium transition ${mode === 'login' ? 'bg-ember text-ink-950' : 'text-ink-400 hover:text-ink-100'}`}>
              Sign In
            </button>
            <button onClick={() => { setMode('register'); setError(''); }}
              className={`flex-1 py-2 text-[12px] font-medium transition leading-tight px-2 ${mode === 'register' ? 'bg-ember text-ink-950' : 'text-ink-400 hover:text-ink-100'}`}>
              Create account · $9.99/mo
            </button>
          </div>

          <form onSubmit={submit} className="space-y-3">
            <input type="email" required placeholder="Email address"
              value={email} onChange={e => setEmail(e.target.value)}
              className="w-full bg-ink-950 ring-1 ring-ink-800 focus:ring-ember/50 rounded-md px-3 py-2.5 text-[14px] text-ink-100 placeholder:text-ink-600 outline-none transition" />
            <input type="password" required placeholder={mode === 'register' ? 'Password (min 6 chars)' : 'Password'}
              value={password} onChange={e => setPassword(e.target.value)}
              className="w-full bg-ink-950 ring-1 ring-ink-800 focus:ring-ember/50 rounded-md px-3 py-2.5 text-[14px] text-ink-100 placeholder:text-ink-600 outline-none transition" />
            {mode === 'register' && (
              <p className="text-[11px] text-ink-600 font-mono px-1">
                After registering you'll send us an invoice request to activate your account.
              </p>
            )}
            {error && (
              <p className="font-mono text-[12px] text-live bg-live/10 ring-1 ring-live/30 rounded-md px-3 py-2">{error}</p>
            )}
            <button type="submit" disabled={loading}
              className="w-full h-11 rounded-md bg-ember hover:bg-ember/90 disabled:opacity-60 text-ink-950 font-semibold text-[14px] transition">
              {loading ? 'Please wait…' : mode === 'login' ? 'Sign In' : 'Create account for $9.99/month'}
            </button>
          </form>
        </>)}
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────
function App() {
  const [videos, setVideos] = useState([]);
  const [loading, setLoading] = useState(true);
  const [query, setQuery] = useState('');
  const [active, setActive] = useState('All Shows');
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [playing, setPlaying] = useState(null);
  const [theme, setTheme] = useState(() => {
    try { return localStorage.getItem('theme') || 'dark'; } catch { return 'dark'; }
  });

  // ── Premium / user auth state ──────────────────────────────────────────
  const [premium, setPremium] = useState(false);
  const [userEmail, setUserEmail] = useState('');
  const [userStatus, setUserStatus] = useState(''); // '' | 'pending' | 'approved' | 'rejected'
  const [authModal, setAuthModal] = useState(false);

  useEffect(() => {
    document.documentElement.classList.toggle('light', theme === 'light');
    try { localStorage.setItem('theme', theme); } catch {}
    // Keep Android status bar colour in sync
    const meta = document.getElementById('theme-color-meta');
    if (meta) meta.setAttribute('content', theme === 'light' ? '#f5f4f1' : '#1c1916');
  }, [theme]);

  const toggleTheme = () => setTheme(t => t === 'dark' ? 'light' : 'dark');

  const VALID_CATEGORIES = new Set(CATEGORIES.filter(c => c !== 'All Shows'));

  // Show "Free" tab only when premium is on and user is not approved
  const showFreeTab = premium && !(userEmail && userStatus === 'approved');
  const displayCategories = useMemo(() =>
    showFreeTab ? ['All Shows', 'Free', ...CATEGORIES.slice(1)] : CATEGORIES,
    [showFreeTab]
  );

  // Reset to "All Shows" if the Free tab disappears (user just got approved)
  useEffect(() => {
    if (!showFreeTab && active === 'Free') setActive('All Shows');
  }, [showFreeTab]);

  // Fetch posts + premium status + user session in parallel
  useEffect(() => {
    const postsP = fetch('/api/posts?limit=100&sort=newest').then(r => r.json());
    const premiumP = fetch('/api/settings/premium').then(r => r.json()).catch(() => ({ premium: false }));
    const userP = fetch('/api/auth/user-status').then(r => r.json()).catch(() => ({ logged_in: false, email: '' }));

    Promise.all([postsP, premiumP, userP]).then(([postsData, premiumData, userData]) => {
      const all = (postsData.posts || [])
        .map(postToVideo)
        .filter(v => VALID_CATEGORIES.has(v.category));
      setVideos(all);
      setPremium(!!premiumData.premium);
      setUserEmail(userData.email || '');
      setUserStatus(userData.status || '');
      setLoading(false);
    }).catch(() => setLoading(false));
  }, []);

  // Free IDs = random 20%, seeded by today's date — stable all day, different tomorrow
  const freeIds = useMemo(() => {
    if (!premium || videos.length === 0) return null;
    // Date seed: YYYYMMDD — same shuffle for the whole day
    const t = new Date();
    let s = t.getFullYear() * 10000 + (t.getMonth() + 1) * 100 + t.getDate();
    // Fisher-Yates shuffle using a simple LCG
    const ids = videos.map(v => v.id);
    for (let i = ids.length - 1; i > 0; i--) {
      s = (s * 1664525 + 1013904223) | 0;
      const j = ((s >>> 0) % (i + 1));
      [ids[i], ids[j]] = [ids[j], ids[i]];
    }
    const count = Math.max(1, Math.ceil(ids.length * 0.2));
    return new Set(ids.slice(0, count));
  }, [videos, premium]);

  const handleUserLogout = async () => {
    await fetch('/api/auth/user-logout', { method: 'POST' }).catch(() => {});
    setUserEmail('');
    setUserStatus('');
  };

  // Re-check approval status (for pending users waiting for admin)
  const checkApproval = async () => {
    try {
      const d = await fetch('/api/auth/user-status').then(r => r.json());
      setUserStatus(d.status || '');
    } catch {}
  };

  // Only approved users get full access; pending/not-logged-in see free 20% only
  const isLocked = useCallback(v => {
    if (!premium) return false;
    if (userEmail && userStatus === 'approved') return false;
    return !(freeIds && freeIds.has(v.id));
  }, [premium, userEmail, userStatus, freeIds]);

  const handlePremiumOpen = useCallback(v => {
    if (isLocked(v)) { setAuthModal(true); return; }
    setPlaying(v);
  }, [isLocked]);

  // Scroll to top whenever the active category changes
  useEffect(() => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, [active]);

  // ⌘K / Escape shortcut
  useEffect(() => {
    const fn = e => {
      if ((e.metaKey||e.ctrlKey) && e.key.toLowerCase()==='k') { e.preventDefault(); document.querySelector('input[placeholder^="Search"]')?.focus(); }
      if (e.key==='Escape') { if (authModal) setAuthModal(false); else if (playing) setPlaying(null); }
    };
    window.addEventListener('keydown', fn);
    return () => window.removeEventListener('keydown', fn);
  }, [playing, authModal]);

  const filtered = useMemo(() => {
    const q = query.trim().toLowerCase();
    return videos.filter(v => {
      if (active === 'Free') return isLocked ? !isLocked(v) : false;
      if (active !== 'All Shows' && v.category !== active) return false;
      if (!q) return true;
      return v.title.toLowerCase().includes(q) || v.description.toLowerCase().includes(q) || v.host.toLowerCase().includes(q) || v.category.toLowerCase().includes(q);
    });
  }, [videos, query, active, isLocked]);

  const counts = useMemo(() => {
    const c = { 'All Shows': videos.length };
    if (isLocked) c['Free'] = videos.filter(v => !isLocked(v)).length;
    for (const v of videos) c[v.category] = (c[v.category]||0)+1;
    return c;
  }, [videos, isLocked]);

  return (
    <div className="min-h-screen text-ink-100">
      <Header
        query={query} setQuery={setQuery} onOpenMenu={() => setDrawerOpen(true)}
        theme={theme} onToggleTheme={toggleTheme}
        premium={premium} userEmail={userEmail} userStatus={userStatus}
        onOpenAuth={() => setAuthModal(true)}
        onUserLogout={handleUserLogout}
        onCheckApproval={checkApproval}
      />
      <CategoryBar categories={displayCategories} active={active} setActive={c => { setActive(c); setPlaying(null); }} counts={counts} />
      <MobileDrawer open={drawerOpen} onClose={() => setDrawerOpen(false)} categories={displayCategories} active={active} setActive={setActive} counts={counts} />

      {/* Auth modal */}
      {authModal && (
        <UserAuthModal
          onClose={() => setAuthModal(false)}
          onSuccess={(email, status) => {
            setUserEmail(email);
            setUserStatus(status);
            // Only auto-close when fully approved — pending/rejected show their own screen inside the modal
            if (status === 'approved') setAuthModal(false);
          }}
        />
      )}

      <main className="max-w-[1400px] mx-auto px-4 md:px-8 py-8 md:py-10">
        {loading ? (
          <div className="flex items-center justify-center py-32 gap-3 text-ink-400">
            <span className="inline-block w-5 h-5 border-2 border-ink-700 border-t-ember rounded-full spin" />
            Loading segments…
          </div>
        ) : playing ? (
          <WatchView
            video={playing} all={videos}
            onOpen={handlePremiumOpen} onClose={() => setPlaying(null)}
            isLocked={isLocked}
          />
        ) : (
          <BrowseView
            videos={filtered} activeCategory={active} query={query}
            onOpen={handlePremiumOpen} onOpenAuth={() => setAuthModal(true)}
            featured={videos[0]}
            premium={premium} userEmail={userEmail} isLocked={isLocked}
          />
        )}
      </main>

      <footer className="border-t border-ink-800 mt-16">
        <div className="max-w-[1400px] mx-auto px-4 md:px-8 py-10 grid md:grid-cols-4 gap-8 text-[13px]">
          <div className="md:col-span-2">
            <div className="flex items-center gap-2">
              {/* Mobile: favicon; Desktop: text only */}
              <img src="/static/images/favicon.png" alt="" className="sm:hidden w-6 h-6 rounded-sm object-cover" />
              <span className="font-serif text-xl text-ink-100">msnow.click</span>
            </div>
            <p className="mt-3 text-ink-500 max-w-sm">Daily political coverage from every MSNOW show. Auto-updated every 15 minutes.</p>
          </div>
          <div>
            <div className="font-mono text-[10px] uppercase tracking-[0.18em] text-ink-600 mb-3">Shows</div>
            <ul className="space-y-2 text-ink-400">
              {CATEGORIES.slice(1,5).map(c => <li key={c}><button className="hover:text-ink-100 text-left">{c}</button></li>)}
            </ul>
          </div>
          <div>
            <div className="font-mono text-[10px] uppercase tracking-[0.18em] text-ink-600 mb-3">Site</div>
            <ul className="space-y-2 text-ink-400">
              <li><a href="/admin" className="hover:text-ink-100">Admin</a></li>
            </ul>
          </div>
        </div>
        <div className="border-t border-ink-850">
          <div className="max-w-[1400px] mx-auto px-4 md:px-8 py-5 flex flex-wrap items-center justify-between gap-3 text-[11px] font-mono uppercase tracking-[0.18em] text-ink-600">
            <span>© 2026 msnow.click</span>
            <span>Built for the way news actually moves.</span>
          </div>
        </div>
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
