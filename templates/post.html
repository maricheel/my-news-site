{% extends "base.html" %}
{% block title %}Post — NewsHub{% endblock %}

{% block content %}
<div id="post-container" class="single-post">
    <div class="loading"> </div>
</div>

<script>
    const postId = {{ post_id }};

    async function loadPost() {
        try {
            const res = await fetch(`/api/posts/${postId}`);
            if (!res.ok) {
                document.getElementById('post-container').innerHTML = '<div class="error">Post not found.</div>';
                return;
            }
            const post = await res.json();

            document.title = post.title + ' — NewsHub';

            const showName = post.categories && post.categories.length ? post.categories[0] : '';

            document.getElementById('post-container').innerHTML = `
                <a href="/" class="back-link">← Back to all shows</a>

                <header class="post-header">
                    ${showName ? `<span class="post-show-badge">${escHtml(showName)}</span>` : ''}
                    <h1 class="post-title">${escHtml(post.title)}</h1>
                    <div class="post-meta">
                        <span>${fmtDate(post.created_at)}</span>
                        ${post.categories && post.categories.length > 1
                            ? `<span>${post.categories.slice(1).map(escHtml).join(', ')}</span>`
                            : ''}
                    </div>
                </header>

                ${post.thumbnail_url && !post.rumble_link ? `
                <div class="post-hero-thumb">
                    <img src="${post.thumbnail_url}" alt="${escHtml(post.title)}">
                </div>` : ''}

                ${post.rumble_link ? `
                <div class="video-wrapper">
                    <iframe src="${post.rumble_link}" allowfullscreen frameborder="0" scrolling="no"></iframe>
                </div>` : ''}

                <div class="post-content">${post.content}</div>
            `;
        } catch (err) {
            document.getElementById('post-container').innerHTML = '<div class="error">Failed to load post.</div>';
        }
    }

    function escHtml(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    function fmtDate(ts) {
        return new Date(ts).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    }

    loadPost();
</script>
{% endblock %}
