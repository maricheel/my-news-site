{% extends "base.html" %}
{% block title %}Post — NEWSGRID{% endblock %}

{% block content %}
<div id="post-wrap" class="max-w-[900px] mx-auto">
  <div class="flex items-center justify-center py-20 gap-3 text-ink-400" id="loader">
    <span class="inline-block w-5 h-5 border-2 border-ink-700 border-t-ember rounded-full spin"></span>
    Loading segment…
  </div>
</div>

<script>
(async () => {
  const id = {{ post_id }};
  const wrap = document.getElementById('post-wrap');

  function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
  function relTime(ts){
    const d=(Date.now()-new Date(ts))/1000;
    if(d<3600) return Math.floor(d/60)+'m ago';
    if(d<86400) return Math.floor(d/3600)+'h ago';
    if(d<604800) return Math.floor(d/86400)+'d ago';
    return new Date(ts).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  }

  try {
    const res = await fetch(`/api/posts/${id}`);
    if (!res.ok) throw new Error('not found');
    const post = await res.json();

    document.title = post.title + ' — NEWSGRID';

    const show = post.categories?.[0] || '';
    const hosts = {
      'Morning Joe':'Joe & Mika','Chris Jansing Reports':'Chris Jansing',
      'Katy Tur Reports':'Katy Tur','Deadline: White House':'Nicolle Wallace',
      'The Beat With Ari Melber':'Ari Melber','The Weeknight':'Symone, Alicia & Michael',
      'All In with Chris Hayes':'Chris Hayes','The Rachel Maddow Show':'Rachel Maddow',
      'The Briefing with Jen Psaki':'Jen Psaki',
      "The Last Word with Lawrence O'Donnell":"Lawrence O'Donnell",
      'The 11th Hour with Stephanie Ruhle':'Stephanie Ruhle',
      'Velshi':'Ali Velshi','Alex Witt Reports':'Alex Witt',
      'PoliticsNation with Al Sharpton':'Al Sharpton',
    };
    const host = hosts[show] || 'Newsroom';

    wrap.innerHTML = `
      <a href="/" class="inline-flex items-center gap-2 mb-6 text-[13px] text-ink-400 hover:text-ink-100 transition">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="m19 12H5M12 5l-7 7 7 7"/></svg>
        Back to all shows
      </a>

      <article>
        <header class="mb-6">
          ${show ? `<span class="inline-block mb-3 px-2.5 py-1 rounded-sm bg-ember/15 text-ember font-mono text-[11px] uppercase tracking-[0.18em]">${esc(show)}</span>` : ''}
          <h1 class="font-serif text-3xl md:text-4xl text-ink-100 leading-tight text-balance mb-4">${esc(post.title)}</h1>
          <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-full bg-gradient-to-br from-ember-deep to-ember flex items-center justify-center text-ink-950 font-serif text-base shrink-0">${host.charAt(0)}</div>
            <div>
              <div class="text-[14px] text-ink-100">${esc(host)}</div>
              <div class="font-mono text-[11px] text-ink-500">${relTime(post.created_at)}</div>
            </div>
          </div>
        </header>

        ${post.rumble_link ? `
        <div class="relative w-full overflow-hidden rounded-xl ring-1 ring-white/10 mb-8 bg-ink-950" style="padding-bottom:56.25%;height:0">
          <iframe src="${post.rumble_link}" class="absolute inset-0 w-full h-full" allowfullscreen frameborder="0" scrolling="no"></iframe>
        </div>` : ''}

        <div class="rounded-xl bg-ink-900/60 ring-1 ring-ink-800 p-6 md:p-8">
          <div class="prose-content text-[16px] leading-relaxed text-ink-300">
            ${post.content}
          </div>
          ${post.categories?.length ? `
          <div class="mt-6 pt-5 border-t border-ink-800 flex flex-wrap gap-1.5">
            ${post.categories.map(c=>`<span class="inline-flex items-center px-2 py-1 rounded font-mono text-[10px] uppercase tracking-wider bg-ink-850 text-ink-300 ring-1 ring-ink-800">#${esc(c.replace(/[\s:]/g,''))}</span>`).join('')}
          </div>` : ''}
        </div>

        <div class="mt-8 flex items-center justify-between">
          <a href="/" class="inline-flex items-center gap-2 h-10 px-4 rounded-md ring-1 ring-ink-700 hover:ring-ink-500 text-ink-300 hover:text-ink-100 text-[13px] transition">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="m19 12H5M12 5l-7 7 7 7"/></svg>
            All segments
          </a>
        </div>
      </article>
    `;
  } catch(e) {
    wrap.innerHTML = `<div class="rounded-xl ring-1 ring-ink-800 bg-ink-900/40 p-12 text-center">
      <div class="font-serif text-xl text-ink-100 mb-2">Segment not found</div>
      <a href="/" class="text-ember-soft hover:text-ember text-sm">← Back to all shows</a>
    </div>`;
  }
})();
</script>

<style>
  .prose-content p { margin-bottom: 1rem; }
  .prose-content h2,.prose-content h3 { font-family:'Instrument Serif',Georgia,serif; color:oklch(0.96 0.005 85); margin:1.5rem 0 .5rem; font-size:1.3rem; }
  .prose-content a { color:oklch(0.78 0.13 45); }
  .prose-content a:hover { text-decoration:underline; }
  .prose-content img { max-width:100%; border-radius:.5rem; margin:1rem 0; }
  .prose-content iframe { max-width:100%; }
</style>
{% endblock %}
