{% extends "base.html" %}
{% block title %}Search — NEWSGRID{% endblock %}

{% block content %}
<div class="max-w-[1000px] mx-auto">

  <div class="mb-8">
    <div class="font-mono text-[11px] uppercase tracking-[0.22em] text-ember-soft mb-2">Find anything</div>
    <h1 class="font-serif text-3xl text-ink-100">Search</h1>
  </div>

  <form action="/search" method="get" class="mb-10">
    <div class="flex gap-0 rounded-xl overflow-hidden ring-1 ring-ink-800 focus-within:ring-ember/50 bg-ink-900 transition">
      <input type="text" name="q" value="{{ query }}" placeholder="Search shows, hosts, topics…" autofocus
        class="flex-1 bg-transparent border-none outline-none px-5 py-4 text-[16px] placeholder:text-ink-600 text-ink-100">
      <button type="submit" class="px-6 bg-ember hover:bg-ember-soft text-ink-950 font-medium text-[14px] transition shrink-0">Search</button>
    </div>
  </form>

  <div id="results">
    {% if query %}
    <div class="flex items-center justify-center py-20 gap-3 text-ink-400">
      <span class="inline-block w-5 h-5 border-2 border-ink-700 border-t-ember rounded-full spin"></span>
      Searching…
    </div>
    {% else %}
    <div class="rounded-xl ring-1 ring-ink-800 bg-ink-900/40 p-12 text-center text-ink-500">
      Enter a term above to search all segments.
    </div>
    {% endif %}
  </div>
</div>

{% if query %}
<script>
(async () => {
  const q = {{ query | tojson }};
  const el = document.getElementById('results');

  function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
  function relTime(ts){
    const d=(Date.now()-new Date(ts))/1000;
    if(d<3600) return Math.floor(d/60)+'m ago';
    if(d<86400) return Math.floor(d/3600)+'h ago';
    if(d<604800) return Math.floor(d/86400)+'d ago';
    return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric'});
  }
  function stripHtml(h){ return h ? h.replace(/<[^>]*>/g,'').trim() : ''; }

  try {
    const res = await fetch(`/api/posts/search?q=${encodeURIComponent(q)}&limit=24`);
    const data = await res.json();

    if (data.error) { el.innerHTML = `<div class="text-center py-12 text-ink-400">${esc(data.error)}</div>`; return; }
    if (!data.posts.length) {
      el.innerHTML = `<div class="rounded-xl ring-1 ring-ink-800 bg-ink-900/40 p-12 text-center">
        <div class="font-serif text-xl text-ink-100 mb-1">No results for "${esc(q)}"</div>
        <div class="text-ink-500 text-sm">Try a different keyword or browse by show on the homepage.</div>
      </div>`;
      return;
    }

    el.innerHTML = `
      <div class="font-mono text-[11px] uppercase tracking-[0.18em] text-ink-500 mb-5">${data.count} result${data.count!==1?'s':''} for "<span class="text-ember-soft">${esc(q)}</span>"</div>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-x-5 gap-y-8">
        ${data.posts.map(post => {
          const show = post.categories?.[0] || '';
          const excerpt = stripHtml(post.content).slice(0, 110);
          const thumb = post.thumbnail_url
            ? `<img src="${post.thumbnail_url}" alt="" class="w-full h-full object-cover" loading="lazy">`
            : `<div class="w-full h-full flex items-center justify-center bg-gradient-to-br from-ink-850 to-ink-900 text-ink-700 font-serif text-4xl">N</div>`;
          return `
            <a href="/post/${post.id}" class="group block fade-up focus:outline-none focus-visible:ring-2 focus-visible:ring-ember/70 rounded-md">
              <div class="relative overflow-hidden rounded-md ring-1 ring-white/5 group-hover:ring-white/15 transition" style="aspect-ratio:16/9">
                ${thumb}
                <div class="absolute inset-0 bg-gradient-to-t from-ink-950/80 via-transparent to-transparent"></div>
                ${post.rumble_link ? '<span class="absolute right-2 top-2 rounded-sm bg-ink-950/75 backdrop-blur-sm px-1.5 py-0.5 font-mono text-[10px] text-ink-100 ring-1 ring-white/10">▶ VIDEO</span>' : ''}
              </div>
              <div class="mt-3 space-y-1.5">
                ${show ? `<div class="font-mono text-[11px] uppercase tracking-[0.14em] text-ember-soft">${esc(show)}</div>` : ''}
                <h3 class="text-[15px] leading-snug font-medium text-ink-100 group-hover:text-ember-soft transition-colors line-clamp-2">${esc(post.title)}</h3>
                ${excerpt ? `<p class="text-[13px] text-ink-500 line-clamp-2">${esc(excerpt)}</p>` : ''}
                <div class="text-xs text-ink-600 font-mono">${relTime(post.created_at)}</div>
              </div>
            </a>`;
        }).join('')}
      </div>`;
  } catch(e) {
    el.innerHTML = '<div class="text-center py-12 text-ink-400">Search failed. Please try again.</div>';
  }
})();
</script>
{% endif %}
{% endblock %}
