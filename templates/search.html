{% extends "base.html" %}
{% block title %}Search — NewsHub{% endblock %}

{% block content %}
<div class="search-page">
    <h1>Search</h1>

    <form class="search-form" action="/search" method="get">
        <input type="text" name="q" value="{{ query }}" placeholder="Search shows, topics, guests..." autofocus>
        <button type="submit">Search</button>
    </form>

    <div id="results-container">
        {% if query %}
            <div class="loading"> </div>
        {% else %}
            <div class="search-hint">Enter a term above to search all posts.</div>
        {% endif %}
    </div>
</div>

{% if query %}
<script>
    const q = {{ query | tojson }};

    async function doSearch() {
        try {
            const res = await fetch(`/api/posts/search?q=${encodeURIComponent(q)}&limit=24`);
            const data = await res.json();

            if (data.error) {
                document.getElementById('results-container').innerHTML = `<div class="error">${data.error}</div>`;
                return;
            }

            if (!data.posts.length) {
                document.getElementById('results-container').innerHTML =
                    `<div class="search-hint-empty">No results for "<strong>${escHtml(q)}</strong>". Try a different term.</div>`;
                return;
            }

            document.getElementById('results-container').innerHTML = `
                <p class="results-count">${data.count} result${data.count !== 1 ? 's' : ''} for "<strong>${escHtml(q)}</strong>"</p>
                <div class="posts-grid">
                    ${data.posts.map(post => `
                        <article class="post-card">
                            <a href="/post/${post.id}" class="post-card-link">
                                <div class="post-card-thumb">
                                    ${post.thumbnail_url
                                        ? `<img src="${post.thumbnail_url}" alt="" loading="lazy">`
                                        : `<div class="thumb-placeholder">📺</div>`
                                    }
                                </div>
                                <div class="post-card-body">
                                    ${post.categories && post.categories.length
                                        ? `<div class="post-card-show">${escHtml(post.categories[0])}</div>`
                                        : ''
                                    }
                                    <h2 class="post-card-title">${escHtml(post.title)}</h2>
                                    <div class="post-card-meta">
                                        <span>${fmtDate(post.created_at)}</span>
                                        ${post.rumble_link ? '<span class="has-video">▶ Video</span>' : ''}
                                    </div>
                                </div>
                            </a>
                        </article>
                    `).join('')}
                </div>
            `;
        } catch (err) {
            document.getElementById('results-container').innerHTML = '<div class="error">Search failed. Please try again.</div>';
        }
    }

    function escHtml(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    function fmtDate(ts) {
        return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    doSearch();
</script>
{% endif %}
{% endblock %}
